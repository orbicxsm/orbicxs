<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs | Smart Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d; --card: #161616; --border: #262626;
            --text: #ffffff; --sub: #888; --up: #00ff88; --down: #ff3b3b;
            --accent: #007aff;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 15px;
        }

        .container { max-width: 700px; margin: 0 auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 2px; margin: 0; }
        .live-dot { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--up); }
        .dot { height: 8px; width: 8px; background: var(--up); border-radius: 50%; animation: pulse 1.5s infinite; }

        /* Tabs */
        .tabs { display: flex; background: var(--card); border-radius: 12px; padding: 4px; margin: 15px 0; border: 1px solid var(--border); }
        .tab-btn {
            flex: 1; padding: 10px; border: none; background: none; color: var(--sub);
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent); color: white; }

        /* List Area */
        .list-box { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .item-wrapper { border-bottom: 1px solid var(--border); }
        .item-wrapper:last-child { border: none; }

        .item-main { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 14px 18px; cursor: pointer; transition: 0.2s;
        }
        .item-main:hover { background: #1c1c1c; }

        /* Left Section */
        .left { display: flex; align-items: center; gap: 12px; }
        .icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .icon img { width: 100%; height: 100%; border-radius: 50%; }
        
        .name-box { display: flex; flex-direction: column; }
        .sym { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; }
        .full { font-size: 10px; color: var(--sub); text-transform: uppercase; }

        /* Right Section */
        .right { text-align: right; }
        .price { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; }
        .chg { font-size: 10px; margin-top: 2px; color: var(--sub); }

        /* Chart Area */
        .chart-container {
            height: 0; overflow: hidden; transition: height 0.4s ease;
            background: #000;
        }
        .chart-container.active { height: 220px; border-top: 1px solid var(--border); }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #searchInput {
            width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; color: white; margin-bottom: 15px; outline: none; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ORBICXS</h1>
        <div class="live-dot"><div class="dot"></div> LIVE MONITOR</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-fiat" onclick="switchTab('fiat')">VALYUTA (CBU)</button>
        <button class="tab-btn" id="btn-crypto" onclick="switchTab('crypto')">KRIPTO (BINANCE)</button>
    </div>

    <input type="text" id="searchInput" placeholder="Qidiruv (masalan: USD, BTC)..." onkeyup="filterItems()">

    <div id="mainList" class="list-box">
        </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

<script>
    let currentMode = 'fiat';
    let socket;

    // Bayroqlar
    const flags = {
        "USD": "🇺🇸", "EUR": "🇪🇺", "RUB": "🇷🇺", "GBP": "🇬🇧", "JPY": "🇯🇵", 
        "TRY": "🇹🇷", "KZT": "🇰🇿", "AED": "🇦🇪", "CNY": "🇨🇳", "CHF": "🇨🇭", "CAD": "🇨🇦"
    };

    // Asosiy kriptolar
    const cryptos = ["BTC", "ETH", "BNB", "SOL", "XRP", "ADA", "AVAX", "DOGE"];

    async function loadCbu() {
        try {
            const res = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
            const data = await res.json();
            const container = document.getElementById('mainList');
            container.innerHTML = "";

            data.forEach(item => {
                if(flags[item.Ccy]) {
                    renderRow(item.Ccy, item.CcyNm_UZ, flags[item.Ccy], 
                              parseFloat(item.Rate).toLocaleString() + " UZS", "FX_IDC:USD" + item.Ccy, false);
                }
            });
        } catch (e) { console.log("CBU error"); }
    }

    function loadCrypto() {
        const container = document.getElementById('mainList');
        container.innerHTML = "";

        cryptos.forEach(s => {
            const img = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${s.toLowerCase()}.png`;
            renderRow(s, "Kripto Aktiv", `<img src="${img}">`, "Yuklanmoqda...", `BINANCE:${s}USDT`, true);
        });

        if (socket) socket.close();
        socket = new WebSocket(`wss://stream.binance.com:9443/ws/${cryptos.map(s => s.toLowerCase() + 'usdt@ticker').join('/')}`);

        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const sym = data.s.replace('USDT', '');
            const priceEl = document.getElementById('price-' + sym);
            if (priceEl) priceEl.innerText = "$ " + parseFloat(data.c).toLocaleString();
        };
    }

    function renderRow(sym, name, icon, price, tvSym, isCrypto) {
        const container = document.getElementById('mainList');
        const wrapper = document.createElement('div');
        wrapper.className = 'item-wrapper';
        wrapper.innerHTML = `
            <div class="item-main" onclick="toggleChart(this, '${tvSym}')">
                <div class="left">
                    <div class="icon">${icon}</div>
                    <div class="name-box">
                        <span class="sym">${sym}</span>
                        <span class="full">${name}</span>
                    </div>
                </div>
                <div class="right">
                    <div class="price" id="price-${sym}">${price}</div>
                    <div class="chg">Batafsil ko'rish</div>
                </div>
            </div>
            <div class="chart-container" id="chart-res-${sym}"></div>
        `;
        container.appendChild(wrapper);
    }

    function toggleChart(el, symbol) {
        const container = el.nextElementSibling;
        const isActive = container.classList.contains('active');
        
        // Barcha ochiq grafiklarni yopish
        document.querySelectorAll('.chart-container').forEach(c => c.classList.remove('active'));
        
        if(!isActive) {
            container.classList.add('active');
            const chartId = container.id;
            
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "H",
                "theme": "dark",
                "style": "3",
                "locale": "uz",
                "container_id": chartId,
                "hide_top_toolbar": true,
                "hide_legend": true,
                "save_image": false
            });
        }
    }

    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('btn-fiat').classList.toggle('active', mode === 'fiat');
        document.getElementById('btn-crypto').classList.toggle('active', mode === 'crypto');
        if (socket) socket.close();
        mode === 'fiat' ? loadCbu() : loadCrypto();
    }

    function filterItems() {
        const val = document.getElementById('searchInput').value.toUpperCase();
        document.querySelectorAll('.item-wrapper').forEach(item => {
            item.style.display = item.innerText.toUpperCase().includes(val) ? 'block' : 'none';
        });
    }

    loadCbu();
</script>
</body>
</html>
