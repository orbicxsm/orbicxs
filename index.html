<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Orbicxs Home</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: white; overflow: hidden;
        }
        .logo {
            font-size: 5.5rem; font-weight: 900; color: #00ccff;
            text-shadow: 0 0 35px rgba(0, 204, 255, 0.6); margin-bottom: 20px;
        }
        .search-box {
            width: 500px; padding: 18px 25px;
            font-size: 1.2rem; border: none; border-radius: 50px;
            outline: none; background: white; color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .currency-box {
            margin-top: 50px; display: flex; gap: 30px;
            background: rgba(255,255,255,0.05); padding: 15px 40px;
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .currency-item span { color: #00ccff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="logo">Orbicxs</div>
    
    <input type="text" id="searchInput" class="search-box" 
           placeholder="Nima qidiramiz?" autofocus onkeydown="if(event.key==='Enter') search()">

    <div class="currency-box">
        <div class="currency-item">USD <span id="usd">...</span></div>
        <div class="currency-item">EUR <span id="eur">...</span></div>
        <div class="currency-item">RUB <span id="rub">...</span></div>
    </div>

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script>
        var backend;
        new QWebChannel(qt.webChannelTransport, function (channel) {
            backend = channel.objects.backend;
        });

        function search() {
            var val = document.getElementById('searchInput').value.trim();
            if (val && backend) {
                backend.search_now(val); // Python funksiyasini chaqirish
            }
        }

        async function getRates() {
            try {
                const res = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
                const data = await res.json();
                document.getElementById('usd').innerText = data[0].Rate;
                document.getElementById('eur').innerText = data[1].Rate;
                document.getElementById('rub').innerText = data[2].Rate;
            } catch(e) {}
        }
        getRates();
    </script>
</body>
</html>
