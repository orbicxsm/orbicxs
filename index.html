<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs Search</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #202124;
            color: #e8eaed;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
        }
        .header { display: flex; justify-content: flex-end; padding: 15px; font-size: 13px; }
        .header a { color: white; text-decoration: none; margin-left: 15px; opacity: 0.8; }
        .header a:hover { text-decoration: underline; }
        
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Orbicxs Logo Style */
        .logo { font-size: 85px; font-weight: bold; margin-bottom: 30px; cursor: default; user-select: none; }
        .o1 { color: #4285F4; } .r { color: #EA4335; } .b { color: #FBBC05; }
        .i { color: #4285F4; } .c { color: #34A853; } .x { color: #EA4335; } .s { color: #FBBC05; }

        .search-container { width: 100%; max-width: 584px; position: relative; }
        .search-bar {
            width: 100%; background: #303134; border: 1px solid #5f6368;
            border-radius: 24px; padding: 12px 20px; box-sizing: border-box;
            color: white; font-size: 16px; outline: none; transition: box-shadow 0.2s;
        }
        .search-bar:hover, .search-bar:focus {
            background-color: #3c4043; box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-color: rgba(223,225,229,0);
        }
        
        .buttons { margin-top: 25px; }
        .btn {
            background-color: #303134; border: 1px solid #303134; border-radius: 4px;
            color: #e8eaed; font-size: 14px; margin: 5px; padding: 10px 20px;
            cursor: pointer; transition: border 0.2s;
        }
        .btn:hover { border: 1px solid #9aa0a6; color: #fff; }
        
        .footer { background: #171717; padding: 15px; font-size: 14px; color: #9aa0a6; border-top: 1px solid #3c4043; }
    </style>
</head>
<body>
    <div class="header">
        <a href="#">Gmail</a>
        <a href="#">Rasmlar</a>
        <a href="#" style="background: #8ab4f8; color: #202124; padding: 7px 15px; border-radius: 4px; font-weight: bold;">Kirish</a>
    </div>

    <div class="main">
        <div class="logo">
            <span class="o1">O</span><span class="r">r</span><span class="b">b</span><span class="i">i</span><span class="c">c</span><span class="x">x</span><span class="s">s</span>
        </div>
        <div class="search-container">
            <form action="https://www.google.com/search" method="GET">
                <input type="text" name="q" class="search-bar" placeholder="Orbicxs orqali qidiring..." autofocus>
                <div class="buttons">
                    <button type="submit" class="btn">Orbicxs Qidiruvi</button>
                    <button type="button" class="btn" onclick="location.href='https://orbicxs.com'">Omadingizni sinang</button>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">
        O'zbekiston | Orbicxs © 2026
    </div>
</body>
</html>
