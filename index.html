<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs Browser</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a, #1a0033);
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .container {
            max-width: 700px;
        }
        .logo {
            font-size: 4.5rem;
            font-weight: bold;
            color: #00ccff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ccff;
        }
        .tagline {
            font-size: 1.4rem;
            margin-bottom: 50px;
            opacity: 0.9;
        }
        .search-box {
            width: 100%;
            max-width: 600px;
            padding: 18px 25px;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            outline: none;
        }
        .search-box:focus {
            box-shadow: 0 0 0 4px rgba(0, 204, 255, 0.3);
        }
        .buttons {
            margin-top: 30px;
        }
        .btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 0 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: rgba(0, 204, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Orbicxs</div>
        <p class="tagline">Tez va sodda qidiruv</p>
        
        <input type="text" id="searchInput" class="search-box" 
               placeholder="Nima qidirmoqchisiz?" autofocus>
        
        <div class="buttons">
            <button class="btn" onclick="searchGoogle()">Google'da qidirish</button>
            <button class="btn" onclick="goToOrbicxs()">Orbicxs.com ga o'tish</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('searchInput');
        
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchGoogle();
            }
        });

        function searchGoogle() {
            const query = input.value.trim();
            if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}&hl=uz`;
            }
        }

        function goToOrbicxs() {
            window.location.href = "https://orbicxs.com";
        }
    </script>
</body>
</html>
