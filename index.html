<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs Global Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --side: #161b22; --accent: #58a6ff;
            --up: #39d353; --down: #f85149; --text: #c9d1d9;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0;
            display: flex; height: 100vh; flex-direction: row;
        }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100% !important; height: 40vh; }
            #tv-chart { height: 60vh; }
        }

        /* Sidebar */
        .sidebar {
            width: 380px; background: var(--side);
            border-right: 1px solid #30363d; display: flex; flex-direction: column;
        }

        .brand {
            padding: 15px; font-size: 20px; font-weight: bold;
            color: var(--accent); text-align: center; border-bottom: 1px solid #30363d;
        }

        /* Search & Tabs */
        .search-box { padding: 10px; }
        .search-box input {
            width: 100%; padding: 10px; background: #0d1117;
            border: 1px solid #30363d; border-radius: 6px; color: white; box-sizing: border-box;
        }

        .tabs { display: flex; background: #0d1117; border-bottom: 1px solid #30363d; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: none;
            color: #8b949e; cursor: pointer; font-size: 11px; font-weight: bold;
        }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Asset List */
        .asset-list { flex: 1; overflow-y: auto; scrollbar-width: thin; }
        .asset-item {
            display: flex; justify-content: space-between; padding: 12px 15px;
            border-bottom: 1px solid #21262d; cursor: pointer; transition: 0.2s;
        }
        .asset-item:hover { background: #21262d; }
        .name { font-weight: bold; font-size: 14px; color: #fff; }
        .price-box { text-align: right; }
        .price { font-family: monospace; font-size: 14px; font-weight: bold; }
        .chg { font-size: 11px; margin-top: 2px; }

        /* Chart */
        .main-content { flex: 1; position: relative; background: #0d1117; }
        #tv-chart { width: 100%; height: 100%; }

        .up { color: var(--up); }
        .down { color: var(--down); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">ORBICXS GLOBAL</div>
        
        <div class="search-box">
            <input type="text" id="assetSearch" placeholder="Aktivni qidiring (Mas: BTC, UZS, Gold)..." onkeyup="filterAssets()">
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('crypto')">KRIPTO (Binance)</button>
            <button class="tab-btn" onclick="switchTab('fiat')">VALYUTALAR</button>
        </div>

        <div id="asset-container" class="asset-list">
            </div>
    </div>

    <div class="main-content">
        <div id="tv-chart"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentTab = 'crypto';
        let allCrypto = [];
        let allFiat = [];
        let widget = null;

        // 1. Grafikni Yuklash
        function loadChart(symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "D",
                "timezone": "Etc/UTC", "theme": "dark", "style": "1",
                "locale": "uz", "toolbar_bg": "#f1f3f6", "enable_publishing": false,
                "allow_symbol_change": true, "container_id": "tv-chart"
            });
        }
        loadChart("BINANCE:BTCUSDT");

        // 2. Tablarni almashtirish
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderAssets();
        }

        // 3. Kriptolarni Binance'dan olish
        async function getCryptoData() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await res.json();
                // Faqat USDT juftliklarini olish
                allCrypto = data.filter(s => s.symbol.endsWith('USDT')).slice(0, 100); 
                if(currentTab === 'crypto') renderAssets();
            } catch(e) { console.error(e); }
        }

        // 4. Valyutalarni API orqali olish
        async function getFiatData() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                allFiat = Object.keys(data.rates).map(key => ({
                    symbol: key,
                    price: data.rates[key],
                    name: key + " / USD"
                }));
                if(currentTab === 'fiat') renderAssets();
            } catch(e) { console.error(e); }
        }

        // 5. Ro'yxatni chiqarish
        function renderAssets() {
            const container = document.getElementById('asset-container');
            container.innerHTML = '';
            const list = (currentTab === 'crypto') ? allCrypto : allFiat;
            const search = document.getElementById('assetSearch').value.toUpperCase();

            list.forEach(item => {
                const symbolText = item.symbol || item.name;
                if(!symbolText.includes(search)) return;

                const div = document.createElement('div');
                div.className = 'asset-item';
                
                // Grafikni o'zgartirish logikasi
                let tvSymbol = currentTab === 'crypto' ? `BINANCE:${item.symbol}` : `FX_IDC:USD${item.symbol}`;
                div.onclick = () => loadChart(tvSymbol);

                let priceDisplay = currentTab === 'crypto' ? parseFloat(item.lastPrice).toLocaleString() : (1 / item.price).toFixed(4);
                let changeDisplay = currentTab === 'crypto' ? item.priceChangePercent + "%" : "Live";
                let colorClass = (currentTab === 'crypto' && parseFloat(item.priceChangePercent) < 0) ? 'down' : 'up';

                div.innerHTML = `
                    <div class="asset-info">
                        <span class="name">${symbolText}</span>
                    </div>
                    <div class="price-box">
                        <div class="price">${priceDisplay}</div>
                        <div class="chg ${colorClass}">${changeDisplay}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function filterAssets() { renderAssets(); }

        // Ma'lumotlarni yangilab turish
        getCryptoData();
        getFiatData();
        setInterval(getCryptoData, 10000); // Har 10 soniyada kriptolarni yangilash
    </script>
</body>
</html>
