<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs | Live Trading Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --card: #121212;
            --accent: #00f2ff;
            --up: #00ff88;
            --down: #ff3b3b;
            --text: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* Header */
        .header { text-align: center; margin-bottom: 50px; position: relative; }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 45px; letter-spacing: 8px; color: var(--accent); margin: 0; text-shadow: 0 0 15px rgba(0,242,255,0.5); }
        .live-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--down); color: var(--down); font-size: 12px; margin-top: 10px; animation: pulse 1.5s infinite; }
        
        /* Grid System */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1300px; margin: 0 auto; }
        
        .card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 25px; position: relative; overflow: hidden; transition: 0.4s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); opacity: 0.3; }

        .symbol-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .symbol-name { font-size: 18px; font-weight: bold; color: #aaa; }
        
        .price { font-size: 36px; font-weight: 700; color: var(--text); margin: 15px 0; transition: color 0.2s; }
        .change { font-size: 16px; font-weight: bold; padding: 4px 10px; border-radius: 5px; }

        .price.flash-up { color: var(--up); }
        .price.flash-down { color: var(--down); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* TradingView Chart Container */
        #tradingview_chart { height: 500px; margin-top: 50px; border-radius: 20px; overflow: hidden; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="header">
    <h1>ORBICXS MARKET</h1>
    <div class="live-badge">● LIVE CONNECTION ACTIVE</div>
</div>

<div class="market-grid">
    <div class="card">
        <div class="symbol-info">
            <span class="symbol-name">BTC / USDT (Bitcoin)</span>
            <span class="change" id="btc-change">0.00%</span>
        </div>
        <div class="price" id="btc-price">Loading...</div>
    </div>

    <div class="card">
        <div class="symbol-info">
            <span class="symbol-name">ETH / USDT (Ethereum)</span>
            <span class="change" id="eth-change">0.00%</span>
        </div>
        <div class="price" id="eth-price">Loading...</div>
    </div>

    <div class="card">
        <div class="symbol-info">
            <span class="symbol-name">USD / UZS (O'zbek So'mi)</span>
            <span class="change up">+0.02% ▲</span>
        </div>
        <div class="price" id="uzs-price">12,650.00</div>
    </div>
</div>

<div class="header" style="margin-top: 80px;">
    <h2>MARKET ANALYSIS</h2>
</div>
<div id="tradingview_chart"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // 1. WebSocket orqali Kriptovalyutalarni Real-Time olish (Binance)
    const symbols = ['btcusdt', 'ethusdt'];
    const socket = new WebSocket(`wss://stream.binance.com:9443/ws/${symbols.map(s => s + '@ticker').join('/')}`);

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const idMap = { 'BTCUSDT': 'btc', 'ETHUSDT': 'eth' };
        const prefix = idMap[data.s];

        if (prefix) {
            const priceEl = document.getElementById(`${prefix}-price`);
            const changeEl = document.getElementById(`${prefix}-change`);
            const oldPrice = parseFloat(priceEl.innerText.replace('$', '').replace(',', ''));
            const newPrice = parseFloat(data.c);

            // Narx o'zgarganda miltillash
            if (newPrice > oldPrice) priceEl.className = 'price flash-up';
            else if (newPrice < oldPrice) priceEl.className = 'price flash-down';
            
            setTimeout(() => priceEl.className = 'price', 200);

            priceEl.innerText = `$${newPrice.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            const change = parseFloat(data.P).toFixed(2);
            changeEl.innerText = `${change > 0 ? '+' : ''}${change}%`;
            changeEl.style.color = change >= 0 ? 'var(--up)' : 'var(--down)';
        }
    };

    // 2. USD/UZS kursini API orqali olish (Har 1 daqiqada yangilanadi)
    async function updateUZS() {
        try {
            // Bu bepul API
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            const uzsRate = data.rates.UZS;
            document.getElementById('uzs-price').innerText = uzsRate.toLocaleString() + " sum";
        } catch (e) { console.log("UZS error", e); }
    }
    updateUZS();
    setInterval(updateUZS, 60000);

    // 3. TradingView Grafik vidjeti
    new TradingView.widget({
        "width": "100%",
        "height": 500,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "D",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "uz",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "hide_side_toolbar": false,
        "allow_symbol_change": true,
        "container_id": "tradingview_chart"
    });
</script>

</body>
</html>
