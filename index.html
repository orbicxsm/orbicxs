<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs | Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --text: #202124; --border: #dadce0; 
            --up: #137333; --down: #c5221f; --up-bg: #e6f4ea; --down-bg: #fce8e6;
        }
        /* Tungi rejim (ixtiyoriy) */
        @media (prefers-color-scheme: dark) {
            :root { --bg: #202124; --text: #e8eaed; --border: #3c4043; }
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Google Sans', Arial, sans-serif; margin: 0; padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* Google Style Header */
        .header { display: flex; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { font-size: 22px; margin: 0; font-weight: 400; }
        .header span { font-weight: 700; color: #4285f4; }

        /* Search */
        .search-bar { margin-bottom: 30px; }
        #searchInput {
            width: 100%; padding: 12px 20px; border-radius: 24px;
            border: 1px solid var(--border); background: transparent; color: var(--text);
            font-size: 16px; outline: none;
        }

        /* Asset Table */
        .market-list { border-top: 1px solid var(--border); }
        .asset-row {
            border-bottom: 1px solid var(--border); cursor: pointer;
            transition: background 0.2s; overflow: hidden;
        }
        .asset-row:hover { background: rgba(0,0,0,0.02); }

        .asset-main { display: flex; justify-content: space-between; align-items: center; padding: 16px 8px; }
        .asset-info { display: flex; align-items: center; gap: 15px; }
        .asset-symbol { font-weight: 500; font-size: 16px; width: 80px; }
        .asset-name { color: #70757a; font-size: 13px; }

        .asset-price-area { text-align: right; }
        .price-uzs { font-weight: 500; font-size: 16px; }
        .price-change { 
            display: inline-block; padding: 2px 8px; border-radius: 4px; 
            font-size: 12px; font-weight: 500; margin-top: 4px;
        }

        /* Chart Area (Accordion) */
        .chart-drawer {
            max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
            background: rgba(0,0,0,0.01);
        }
        .chart-drawer.active { max-height: 300px; padding-bottom: 15px; }
        .inner-chart { height: 250px; width: 100%; }

        .up { color: var(--up); }
        .down { color: var(--down); }
        .bg-up { background: var(--up-bg); color: var(--up); }
        .bg-down { background: var(--down-bg); color: var(--down); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Orbicxs <span>Finance</span></h1>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Bozorlarni qidirish..." onkeyup="filterList()">
    </div>

    <div id="marketList" class="market-list">
        </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const assets = [
        {id: "BTC", name: "Bitcoin", sym: "BINANCE:BTCUSDT", type: "crypto"},
        {id: "USD", name: "AQSH Dollari", sym: "FX_IDC:USDUZS", type: "fiat"},
        {id: "EUR", name: "Yevro", sym: "FX_IDC:EURUZS", type: "fiat"},
        {id: "RUB", name: "Rossiya Rubli", sym: "FX_IDC:RUBUZS", type: "fiat"},
        {id: "ETH", name: "Ethereum", sym: "BINANCE:ETHUSDT", type: "crypto"},
        {id: "GOLD", name: "Oltin", sym: "TVC:GOLD", type: "fiat"}
    ];

    async function loadPrices() {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        const uzsRate = data.rates.UZS;

        const container = document.getElementById('marketList');
        container.innerHTML = "";

        assets.forEach(asset => {
            const row = document.createElement('div');
            row.className = 'asset-row';
            
            // So'mga aylantirish (Simulyatsiya yoki API ulanishi)
            let priceText = asset.type === "fiat" ? (uzsRate / (data.rates[asset.id] || 1)).toFixed(2) : "Live Data";
            
            row.innerHTML = `
                <div class="asset-main" onclick="toggleChart(this, '${asset.sym}')">
                    <div class="asset-info">
                        <div class="asset-symbol">${asset.id}</div>
                        <div class="asset-name">${asset.name}</div>
                    </div>
                    <div class="asset-price-area">
                        <div class="price-uzs">${priceText} UZS</div>
                        <div class="price-change bg-up">+0.24%</div>
                    </div>
                </div>
                <div class="chart-drawer">
                    <div class="inner-chart" id="chart_${asset.id}"></div>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function toggleChart(el, symbol) {
        const drawer = el.nextElementSibling;
        const isActive = drawer.classList.contains('active');
        
        // Barchasini yopish
        document.querySelectorAll('.chart-drawer').forEach(d => d.classList.remove('active'));

        if (!isActive) {
            drawer.classList.add('active');
            const chartId = drawer.querySelector('.inner-chart').id;
            
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": "light", // Google Finance oq bo'lgani uchun
                "style": "3", // Chiziqli grafik
                "locale": "uz",
                "hide_top_toolbar": true,
                "hide_legend": true,
                "container_id": chartId
            });
        }
    }

    loadPrices();
</script>
</body>
</html>
