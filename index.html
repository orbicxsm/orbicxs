<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs Global Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --sidebar: #101010; --accent: #00d1ff;
            --up: #00ff88; --down: #ff3b3b; --text: #e0e0e0;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0;
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* SIDEBAR - 30% ekran */
        .sidebar {
            width: 30%; min-width: 320px; max-width: 450px;
            background: var(--sidebar); border-right: 1px solid #222;
            display: flex; flex-direction: column; height: 100%;
        }

        .brand {
            padding: 20px; font-weight: bold; font-size: 22px;
            text-align: center; color: var(--accent); border-bottom: 1px solid #222;
            letter-spacing: 3px;
        }

        .tabs { display: flex; border-bottom: 1px solid #222; }
        .tab-btn {
            flex: 1; padding: 15px; border: none; background: none;
            color: #555; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* LIST CONTAINER */
        .asset-list {
            flex: 1; overflow-y: auto; padding: 10px;
            scrollbar-width: thin; scrollbar-color: #333 transparent;
        }

        .asset-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; background: #161616; border-radius: 8px;
            margin-bottom: 8px; cursor: pointer; border: 1px solid transparent;
        }
        .asset-item:hover { border-color: var(--accent); background: #1c1c1c; }

        .name-part { display: flex; flex-direction: column; }
        .symbol { font-weight: 700; font-size: 15px; }
        .full-name { font-size: 11px; color: #777; margin-top: 2px; }

        .price-part { text-align: right; font-family: 'JetBrains Mono', monospace; }
        .price { font-size: 16px; font-weight: bold; }
        .change { font-size: 11px; margin-top: 3px; }

        /* MAIN CONTENT - 70% ekran */
        .main-content { flex: 1; height: 100%; position: relative; background: #000; }
        #tradingview_widget { width: 100%; height: 100%; }

        .up { color: var(--up); }
        .down { color: var(--down); }

        /* Mobil qurilmalar uchun moslashuv */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; max-width: none; height: 45%; }
            .main-content { height: 55%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">ORBICXS</div>
        
        <div class="tabs">
            <button class="tab-btn active" id="btn-crypto" onclick="switchTab('crypto')">KRIPTO</button>
            <button class="tab-btn" id="btn-fiat" onclick="switchTab('fiat')">VALYUTA</button>
        </div>

        <div id="list-container" class="asset-list">
            </div>
    </div>

    <div class="main-content">
        <div id="tradingview_widget"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentTab = 'crypto';
        let cryptoData = {};
        let fiatData = {};

        // 1. TradingView Grafika (Barqaror)
        function initChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "H",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "uz",
                "container_id": "tradingview_widget",
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "save_image": false
            });
        }
        initChart("BINANCE:BTCUSDT");

        // 2. Tab almashtirish
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            renderList();
        }

        // 3. Binance WebSocket (Kriptolarni real-vaqtda olish)
        const cryptoSymbols = ['btcusdt', 'ethusdt', 'bnbusdt', 'solusdt', 'xrpusdt', 'adausdt', 'dogeusdt', 'trxusdt', 'maticusdt', 'dotusdt'];
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${cryptoSymbols.map(s => s + '@ticker').join('/')}`);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            cryptoData[data.s] = {
                price: parseFloat(data.c).toLocaleString(undefined, {minimumFractionDigits: 2}),
                change: data.P + "%",
                isUp: parseFloat(data.P) >= 0,
                tvSym: "BINANCE:" + data.s
            };
            if (currentTab === 'crypto') renderList();
        };

        // 4. Fiat Valyutalarni olish (O'ta barqaror API)
        async function getFiat() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                const list = ['UZS', 'EUR', 'RUB', 'GBP', 'JPY', 'TRY', 'CNY', 'CHF', 'CAD', 'AED'];
                
                list.forEach(ccy => {
                    fiatData[ccy] = {
                        price: data.rates[ccy].toLocaleString(),
                        change: "LIVE",
                        isUp: true,
                        tvSym: "FX_IDC:USD" + ccy
                    };
                });
                if (currentTab === 'fiat') renderList();
            } catch (e) { console.error("Fiat yuklanmadi"); }
        }
        getFiat();
        setInterval(getFiat, 30000); // Har 30 soniyada fiat yangilanadi

        // 5. Ro'yxatni chizish
        function renderList() {
            const container = document.getElementById('list-container');
            const dataSet = currentTab === 'crypto' ? cryptoData : fiatData;
            
            // Tozalash va qayta chizish (faqat o'zgargan qismni)
            let html = '';
            for (let key in dataSet) {
                const item = dataSet[key];
                const colorClass = item.isUp ? 'up' : 'down';
                const displayName = currentTab === 'crypto' ? key.replace('USDT', '') : key;
                const subName = currentTab === 'crypto' ? 'Binance USDT' : 'USD / ' + key;

                html += `
                    <div class="asset-item" onclick="initChart('${item.tvSym}')">
                        <div class="name-part">
                            <span class="symbol">${displayName}</span>
                            <span class="full-name">${subName}</span>
                        </div>
                        <div class="price-part">
                            <div class="price">${item.price}</div>
                            <div class="change ${colorClass}">${item.change}</div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
    </script>
</body>
</html>
