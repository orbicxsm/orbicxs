<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs | Smart Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --card: #111111; --border: #222222;
            --text: #ffffff; --sub: #888888; --up: #00ff88; --accent: #007aff;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 15px;
            padding-bottom: 100px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* Kalkulyator */
        .calc-box {
            background: var(--card); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border); margin-bottom: 20px;
        }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .calc-group input, .calc-group select {
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--border);
            border-radius: 8px; color: var(--up); font-family: 'JetBrains Mono', monospace; outline: none;
        }

        /* Tabs */
        .tabs { display: flex; gap: 5px; background: var(--card); border-radius: 12px; padding: 5px; margin-bottom: 15px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--sub); border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--accent); color: white; }

        /* List Items */
        .item-wrapper { background: var(--card); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; overflow: hidden; }
        .item-main { display: flex; justify-content: space-between; align-items: center; padding: 15px; cursor: pointer; }
        
        .left { display: flex; align-items: center; gap: 15px; }
        .flag-box { width: 32px; height: 22px; border-radius: 3px; overflow: hidden; }
        .flag-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .sym { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; }
        .price-val { font-family: 'JetBrains Mono', monospace; color: var(--up); font-weight: 700; text-align: right; }

        /* Chart */
        .chart-container { height: 0; transition: height 0.3s ease-out; background: #000; }
        .chart-container.active { height: 320px; border-top: 1px solid var(--border); }

        /* MUALLIF YOZUVI (Fixed) */
        .author-tag { 
            position: fixed; bottom: 20px; right: 20px; 
            font-size: 14px; color: #ffffff; font-weight: 800; 
            z-index: 99999; background: #007aff; padding: 8px 15px; 
            border-radius: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: none; text-transform: lowercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; letter-spacing: 2px; font-size: 18px; margin-bottom: 20px;">ORBICXS FINANCE</h2>

    <div class="calc-box">
        <div class="calc-grid">
            <div class="calc-group">
                <input type="number" id="inputAmt" value="1" oninput="convert()">
                <select id="selectFrom" style="margin-top:8px;" onchange="convert()"></select>
            </div>
            <div class="calc-group">
                <input type="text" id="outputAmt" readonly placeholder="Hisoblanmoqda...">
                <div style="font-size:10px; color:var(--sub); margin-top:8px; text-align:center;">O'ZBEK SO'MI (UZS)</div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-fiat" onclick="switchTab('fiat')">VALYUTALAR</button>
        <button class="tab-btn" id="btn-crypto" onclick="switchTab('crypto')">KRIPTO (UZS)</button>
    </div>

    <div id="mainList"></div>

    <div class="author-tag">g'offorov.sh.z</div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let mode = 'fiat';
    let usdToUzs = 12850; // Standart qiymat
    let allRates = {};
    let cbuData = [];
    let socket;

    // Kengaytirilgan Kripto ro'yxati (TON qo'shildi)
    const cryptos = ["BTC", "ETH", "TON", "BNB", "SOL", "XRP", "ADA", "DOGE", "DOT", "LINK", "LTC"];

    async function init() {
        try {
            const res = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
            cbuData = await res.json();
            
            const select = document.getElementById('selectFrom');
            cbuData.forEach(c => {
                allRates[c.Ccy] = parseFloat(c.Rate);
                if(c.Ccy === 'USD') usdToUzs = parseFloat(c.Rate);
                
                const opt = document.createElement('option');
                opt.value = c.Ccy; opt.innerText = c.Ccy;
                select.appendChild(opt);
            });
            render();
            convert();
        } catch (e) { console.error("API error"); }
    }

    function render() {
        const list = document.getElementById('mainList');
        list.innerHTML = "";
        if (socket) socket.close();

        if (mode === 'fiat') {
            cbuData.forEach(c => {
                const flagCode = c.Ccy === 'EUR' ? 'eu' : c.Ccy.substring(0,2).toLowerCase();
                const flag = `https://flagcdn.com/w80/${flagCode}.png`;
                // Grafik uchun: Agar juftlik bo'lmasa, universal USD formatga o'tadi
                const tvSym = (c.Ccy === 'USD' || c.Ccy === 'EUR' || c.Ccy === 'RUB') ? `FX_IDC:${c.Ccy}UZS` : `FX_IDC:USD${c.Ccy}`;
                createItem(c.Ccy, c.CcyNm_UZ, flag, parseFloat(c.Rate).toLocaleString() + " UZS", tvSym);
            });
        } else {
            cryptos.forEach(s => {
                const icon = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${s.toLowerCase()}.png`;
                const tvSym = s === "TON" ? "OKX:TONUSDT" : `BINANCE:${s}USDT`;
                createItem(s, "Live Market", icon, "Yuklanmoqda...", tvSym);
            });
            startCryptoLive();
        }
    }

    function createItem(sym, name, img, price, tv) {
        const wrapper = document.createElement('div');
        wrapper.className = 'item-wrapper';
        wrapper.innerHTML = `
            <div class="item-main" onclick="toggleChart(this, '${tv}', '${sym}')">
                <div class="left">
                    <div class="flag-box"><img src="${img}" onerror="this.src='https://flagcdn.com/w80/un.png'"></div>
                    <div class="name-box">
                        <span class="sym">${sym}</span>
                        <div style="font-size:10px; color:var(--sub)">${name}</div>
                    </div>
                </div>
                <div class="price-val" id="p-${sym}">${price}</div>
            </div>
            <div class="chart-container" id="ch-${sym}"></div>
        `;
        document.getElementById('mainList').appendChild(wrapper);
    }

    function startCryptoLive() {
        socket = new WebSocket(`wss://stream.binance.com:9443/ws/${cryptos.filter(s => s !== "TON").map(s => s.toLowerCase() + 'usdt@ticker').join('/')}`);
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const sym = data.s.replace('USDT', '');
            const priceUZS = (parseFloat(data.c) * usdToUzs).toLocaleString();
            const el = document.getElementById('p-' + sym);
            if (el) el.innerText = priceUZS + " UZS";
        };
    }

    function toggleChart(el, tv, sym) {
        const chartBox = el.nextElementSibling;
        const isOpen = chartBox.classList.contains('active');
        
        document.querySelectorAll('.chart-container').forEach(c => {
            c.classList.remove('active');
            c.innerHTML = "";
        });

        if(!isOpen) {
            chartBox.classList.add('active');
            new TradingView.widget({
                "autosize": true, "symbol": tv, "interval": "H", "theme": "dark",
                "style": "3", "locale": "uz", "container_id": chartBox.id,
                "hide_top_toolbar": true, "hide_legend": true, "save_image": false
            });
        }
    }

    function convert() {
        const amt = document.getElementById('inputAmt').value;
        const from = document.getElementById('selectFrom').value;
        const res = amt * (allRates[from] || 0);
        document.getElementById('outputAmt').value = res.toLocaleString() + " UZS";
    }

    function switchTab(m) {
        mode = m;
        document.getElementById('btn-fiat').classList.toggle('active', m === 'fiat');
        document.getElementById('btn-crypto').classList.toggle('active', m === 'crypto');
        render();
    }

    init();
</script>
</body>
</html>
