<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs | Google Finance Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --card: #f8f9fa; --border: #dadce0;
            --text: #202124; --sub: #70757a; --up: #137333; --accent: #1a73e8;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --border: #3c4043;
            --text: #e8eaed; --sub: #9aa0a6; --up: #81c995; --accent: #8ab4f8;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 15px;
            transition: 0.2s;
        }

        .container { max-width: 650px; margin: 0 auto; }

        /* Google Finance Style Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
        }
        .logo { font-size: 18px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .logo span { color: var(--accent); font-weight: 700; }
        
        .controls { display: flex; align-items: center; gap: 15px; }
        .author { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: lowercase; }
        .theme-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
        }

        /* Calculator */
        .calc-panel {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; margin-bottom: 20px;
        }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .calc-grid input, .calc-grid select {
            width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 4px; color: var(--text); font-size: 16px; outline: none; box-sizing: border-box;
        }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { 
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
            cursor: pointer; font-size: 13px; font-weight: 500; background: var(--card);
        }
        .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Finance List */
        .list-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg); }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .list-item:hover { background: var(--card); }
        .item-l { display: flex; align-items: center; gap: 15px; }
        .flag-box { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; border: 1px solid var(--border); }
        .flag-box img { width: 100%; height: 100%; object-fit: cover; }
        .coin-icon { width: 32px; height: 32px; border-radius: 50%; }

        .price-box { text-align: right; }
        .price-val { font-family: 'Roboto Mono', monospace; font-weight: 700; font-size: 15px; }
        .sync-tag { font-size: 9px; color: var(--up); font-weight: 700; text-transform: uppercase; margin-top: 3px; }

        /* Chart */
        .chart-box { height: 0; overflow: hidden; transition: 0.3s; background: #000; }
        .chart-box.active { height: 400px; border-top: 1px solid var(--border); }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div class="header">
        <div class="logo">Google <span>Finance</span></div>
        <div class="controls">
            <span class="author">g'offorov.sh.z</span>
            <button class="theme-btn" onclick="toggleTheme()">🌓 REJIM</button>
        </div>
    </div>

    <div class="calc-panel">
        <div class="calc-grid">
            <div>
                <input type="number" id="inputAmt" value="1" oninput="calculate()">
                <select id="curSelect" style="margin-top:8px" onchange="calculate()"></select>
            </div>
            <div>
                <input type="text" id="outputAmt" readonly>
                <div style="font-size:11px; color:var(--sub); margin-top:8px; text-align:center;">Real-time Market (UZS)</div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" id="fiatTab" onclick="setMode('fiat')">Valyutalar</div>
        <div class="tab" id="cryptoTab" onclick="setMode('crypto')">Kriptovalyutalar</div>
    </div>

    <div class="list-wrap" id="listBody"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentMode = 'fiat';
    let rates = {};
    let usdToUzs = 12900;
    let socket;

    // Google Finance ro'yxati (Barcha asosiy valyutalar)
    const fiatList = [
        {id: "USD", name: "AQSH Dollari", flag: "us"},
        {id: "EUR", name: "Yevropa Yevrosi", flag: "eu"},
        {id: "RUB", name: "Rossiya Rubli", flag: "ru"},
        {id: "GBP", name: "Britaniya Funti", flag: "gb"},
        {id: "TRY", name: "Turkiya Lirasi", flag: "tr"},
        {id: "KZT", name: "Qozog'iston Tengesi", flag: "kz"},
        {id: "CNY", name: "Xitoy Yuani", flag: "cn"},
        {id: "JPY", name: "Yaponiya Yenasi", flag: "jp"},
        {id: "AED", name: "BAA Dirhami", flag: "ae"}
    ];

    const cryptoList = ["BTC", "ETH", "TON", "SOL", "BNB", "XRP", "DOGE", "NOT", "PEPE", "LTC", "TRX"];

    async function loadPrices() {
        // Narx va grafik bir xil bo'lishi uchun yagona manbadan ma'lumot olish
        const res = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
        const data = await res.json();
        
        const select = document.getElementById('curSelect');
        select.innerHTML = "";

        data.forEach(c => {
            rates[c.Ccy] = parseFloat(c.Rate);
            if(c.Ccy === 'USD') usdToUzs = parseFloat(c.Rate);
            
            const opt = document.createElement('option');
            opt.value = c.Ccy; opt.innerText = `${c.Ccy} - ${c.CcyNm_UZ}`;
            select.appendChild(opt);
        });
        
        render();
        calculate();
    }

    function render() {
        const container = document.getElementById('listBody');
        container.innerHTML = "";
        if(socket) socket.close();

        if(currentMode === 'fiat') {
            fiatList.forEach(item => {
                const price = rates[item.id] ? rates[item.id].toLocaleString() : "---";
                const tvSym = `FX_IDC:${item.id}UZS`;
                buildRow(item.id, item.name, `https://flagcdn.com/w80/${item.flag}.png`, price + " UZS", tvSym, false);
            });
        } else {
            cryptoList.forEach(s => {
                const icon = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${s.toLowerCase()}.png`;
                const tvSym = (s === "TON" || s === "NOT") ? `OKX:${s}USDT` : `BINANCE:${s}USDT`;
                buildRow(s, "Google Finance Data", icon, "Yuklanmoqda...", tvSym, true);
            });
            startWS();
        }
    }

    function buildRow(id, name, img, price, tv, isCrypto) {
        const div = document.createElement('div');
        div.innerHTML = `
            <div class="list-item" onclick="toggleChart(this, '${tv}')">
                <div class="item-l">
                    ${isCrypto ? `<img src="${img}" class="coin-icon">` : `<div class="flag-box"><img src="${img}"></div>`}
                    <div>
                        <div class="ticker">${id}</div>
                        <div class="full-name" style="font-size:11px; color:var(--sub)">${name}</div>
                    </div>
                </div>
                <div class="price-box">
                    <div class="price-val" id="price-${id}">${price}</div>
                    <div class="sync-tag">● Live Sync</div>
                </div>
            </div>
            <div class="chart-box" id="box-${id}"></div>
        `;
        document.getElementById('listBody').appendChild(div);
    }

    function startWS() {
        const binanceSymbols = cryptoList.filter(s => !["TON","NOT"].includes(s));
        socket = new WebSocket(`wss://stream.binance.com:9443/ws/${binanceSymbols.map(s => s.toLowerCase()+'usdt@ticker').join('/')}`);
        socket.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const sym = d.s.replace('USDT','');
            const uzsPrice = (parseFloat(d.c) * usdToUzs).toLocaleString(undefined, {maximumFractionDigits:0});
            const el = document.getElementById('price-' + sym);
            if(el) el.innerText = uzsPrice + " UZS";
        };
    }

    function toggleChart(el, sym) {
        const box = el.nextElementSibling;
        const active = box.classList.contains('active');
        document.querySelectorAll('.chart-box').forEach(b => { b.classList.remove('active'); b.innerHTML = ""; });
        
        if(!active) {
            box.classList.add('active');
            const theme = document.body.getAttribute('data-theme') || 'light';
            new TradingView.widget({
                "autosize": true, "symbol": sym, "interval": "D", "theme": theme,
                "style": "2", "container_id": box.id, "hide_top_toolbar": true, 
                "hide_legend": true, "save_image": false
            });
        }
    }

    function calculate() {
        const val = document.getElementById('inputAmt').value;
        const cur = document.getElementById('curSelect').value;
        document.getElementById('outputAmt').value = (val * (rates[cur]||0)).toLocaleString() + " UZS";
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('fiatTab').classList.toggle('active', m === 'fiat');
        document.getElementById('cryptoTab').classList.toggle('active', m === 'crypto');
        render();
    }

    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        render();
    }

    loadPrices();
</script>
</body>
</html>
