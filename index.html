<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Orbicxs | Global Market</title>
    <style>
        body { background: #0a0e17; color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .market-card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 30px; width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo { font-size: 24px; font-weight: bold; color: #58a6ff; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .currency-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #21262d; }
        .symbol { font-weight: bold; color: #8b949e; }
        .price { color: #39d353; font-family: 'Courier New', monospace; font-size: 18px; }
        .change-up { color: #39d353; font-size: 12px; }
        .change-down { color: #f85149; font-size: 12px; }
        .footer { font-size: 10px; color: #484f58; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="market-card">
        <div class="logo">ORBICXS MARKET</div>
        
        <div class="currency-row">
            <span class="symbol">USD / UZS</span>
            <div style="text-align: right;">
                <div class="price" id="usd-rate">12,650.00</div>
                <span class="change-up" id="usd-diff">+15.00 ▲</span>
            </div>
        </div>

        <div class="currency-row">
            <span class="symbol">EUR / UZS</span>
            <div style="text-align: right;">
                <div class="price" id="eur-rate">13,720.00</div>
                <span class="change-down" id="eur-diff">-5.40 ▼</span>
            </div>
        </div>

        <div class="footer">MA'LUMOTLAR REAL VAQTDA YANGILANMOQDA</div>
    </div>
</body>
</html>
