<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs | Live Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --card: #f8f9fa; --border: #dee2e6;
            --text: #202124; --sub: #70757a; --up: #137333; --accent: #1a73e8;
        }
        [data-theme="dark"] {
            --bg: #080808; --card: #121212; --border: #252525;
            --text: #ffffff; --sub: #aaaaaa; --up: #00ff88; --accent: #2979ff;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 10px;
            transition: background 0.3s ease;
        }

        .container { max-width: 650px; margin: 0 auto; position: relative; }

        /* Top Header */
        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px;
        }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 1px; }
        .top-ctrl { display: flex; align-items: center; gap: 15px; }
        .author { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
        .theme-btn { 
            background: var(--card); border: 1px solid var(--border); 
            color: var(--text); padding: 6px 12px; border-radius: 20px; 
            cursor: pointer; font-size: 11px; font-weight: 600;
        }

        /* Calculator */
        .calc-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .calc-grid input, .calc-grid select {
            width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; color: var(--up); font-family: 'JetBrains Mono'; font-weight: 700; outline: none;
        }

        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-item { 
            flex: 1; padding: 12px; border: 1px solid var(--border); background: var(--card);
            border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 700; text-align: center;
            transition: 0.2s;
        }
        .tab-item.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* List Area */
        .list-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .list-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
            transition: 0.2s;
        }
        .list-row:hover { background: rgba(128,128,128,0.05); }
        .row-l { display: flex; align-items: center; gap: 15px; }
        .f-box { width: 35px; height: 24px; border-radius: 3px; border: 1px solid var(--border); overflow: hidden; }
        .f-box img { width: 100%; height: 100%; object-fit: cover; }
        .c-icon { width: 30px; height: 30px; border-radius: 50%; }
        
        .name-info { display: flex; flex-direction: column; }
        .sym-code { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 15px; }
        .full-name { font-size: 10px; color: var(--sub); text-transform: uppercase; }

        .price-info { text-align: right; }
        .live-price { font-family: 'JetBrains Mono'; font-weight: 700; color: var(--up); font-size: 15px; }
        .status-tag { font-size: 9px; color: var(--sub); font-weight: 600; }

        /* Chart */
        .chart-wrap { height: 0; overflow: hidden; transition: 0.3s ease; background: #000; }
        .chart-wrap.active { height: 380px; border-top: 1px solid var(--border); }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div class="header-top">
        <div class="logo">ORBICXS <span style="color:var(--accent)">FINANCE</span></div>
        <div class="top-ctrl">
            <span class="author">G'OFFOROV.SH.Z   JM AZAMAT AKA</span>
            <button class="theme-btn" onclick="toggleTheme()">🌓 REJIM</button>
        </div>
    </div>

    <div class="calc-box">
        <div class="calc-grid">
            <div>
                <input type="number" id="amtIn" value="1" oninput="runCalc()">
                <select id="curSelect" style="margin-top:8px" onchange="runCalc()"></select>
            </div>
            <div>
                <input type="text" id="amtOut" readonly>
                <div style="font-size:10px; color:var(--sub); margin-top:8px; text-align:center;">MARKET RATE (UZS)</div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab-item active" id="fiat-tab" onclick="setMode('fiat')">BOZOR VALYUTALARI</div>
        <div class="tab-item" id="crypto-tab" onclick="setMode('crypto')">KRIPTO (UZS)</div>
    </div>

    <div class="list-card" id="dataList"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let mode = 'fiat';
    let rates = {};
    let uzsUsd = 1;
    let cbuData = [];
    let socket;

    // Kengaytirilgan Kripto (Ommabop barchasi)
    const cryptoList = ["BTC", "ETH", "TON", "SOL", "BNB", "XRP", "ADA", "NOT", "PEPE", "DOGS", "TRX", "LTC", "DOT"];

    async function init() {
        try {
            const res = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
            cbuData = await res.json();
            
            const sel = document.getElementById('curSelect');
            cbuData.forEach(c => {
                rates[c.Ccy] = parseFloat(c.Rate);
                if(c.Ccy === 'USD') uzsUsd = parseFloat(c.Rate);
                
                const opt = document.createElement('option');
                opt.value = c.Ccy; opt.innerText = `${c.Ccy} - ${c.CcyNm_UZ}`;
                sel.appendChild(opt);
            });
            render();
            runCalc();
        } catch (e) { console.error("Network Error"); }
    }

    function render() {
        const container = document.getElementById('dataList');
        container.innerHTML = "";
        if(socket) socket.close();

        if(mode === 'fiat') {
            cbuData.forEach(c => {
                // Dollar-kursi sayti barcha valyutalarni ko'rsatadi
                const flag = `https://flagcdn.com/w80/${c.Ccy === 'EUR' ? 'eu' : c.Ccy.substring(0,2).toLowerCase()}.png`;
                const tvSym = `FX_IDC:${c.Ccy}UZS`;
                buildRow(c.Ccy, c.CcyNm_UZ, flag, parseFloat(c.Rate).toLocaleString() + " UZS", tvSym, false);
            });
        } else {
            cryptoList.forEach(s => {
                const icon = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${s.toLowerCase()}.png`;
                const tvSym = (s === "TON" || s === "NOT" || s === "DOGS") ? `OKX:${s}USDT` : `BINANCE:${s}USDT`;
                buildRow(s, "Market Live", icon, "Updating...", tvSym, true);
            });
            connectWS();
        }
    }

    function buildRow(id, full, img, price, tv, isCrypto) {
        const item = document.createElement('div');
        item.innerHTML = `
            <div class="list-row" onclick="showChart(this, '${tv}')">
                <div class="row-l">
                    ${isCrypto ? `<img src="${img}" class="c-icon">` : `<div class="f-box"><img src="${img}" onerror="this.src='https://flagcdn.com/w80/un.png'"></div>`}
                    <div class="name-info">
                        <span class="sym-code">${id}</span>
                        <span class="full-name">${full}</span>
                    </div>
                </div>
                <div class="price-info">
                    <div class="live-price" id="price-${id}">${price}</div>
                    <div class="status-tag">LIVE MARKET DATA</div>
                </div>
            </div>
            <div class="chart-wrap" id="wrap-${id}"></div>
        `;
        document.getElementById('dataList').appendChild(item);
    }

    function connectWS() {
        const binanceList = cryptoList.filter(s => !["TON","NOT","DOGS"].includes(s));
        socket = new WebSocket(`wss://stream.binance.com:9443/ws/${binanceList.map(s => s.toLowerCase()+'usdt@ticker').join('/')}`);
        socket.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const sym = d.s.replace('USDT','');
            const uzsPrice = (parseFloat(d.c) * uzsUsd).toLocaleString(undefined, {maximumFractionDigits:0});
            const el = document.getElementById('price-' + sym);
            if(el) el.innerText = uzsPrice + " UZS";
        };
    }

    function showChart(el, sym) {
        const box = el.nextElementSibling;
        const active = box.classList.contains('active');
        document.querySelectorAll('.chart-wrap').forEach(b => { b.classList.remove('active'); b.innerHTML = ""; });
        
        if(!active) {
            box.classList.add('active');
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
            new TradingView.widget({
                "autosize": true, "symbol": sym, "interval": "H", "theme": theme,
                "style": "3", "container_id": box.id, "hide_top_toolbar": true, "hide_legend": true, "save_image": false
            });
        }
    }

    function runCalc() {
        const val = document.getElementById('amtIn').value;
        const cur = document.getElementById('curSelect').value;
        document.getElementById('amtOut').value = (val * (rates[cur]||0)).toLocaleString() + " UZS";
    }

    function setMode(m) {
        mode = m;
        document.getElementById('fiat-tab').classList.toggle('active', m==='fiat');
        document.getElementById('crypto-tab').classList.toggle('active', m==='crypto');
        render();
    }

    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        render();
    }

    init();
</script>
</body>
</html>
