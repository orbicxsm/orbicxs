<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs | Live Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d; --card: #161616; --border: #262626;
            --text: #ffffff; --sub: #888888; --up: #00ff88; --down: #ff3b3b;
            --accent: #007aff;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 15px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        /* Header */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 0; border-bottom: 1px solid var(--border); 
        }
        .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; margin: 0; }
        .live-dot { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--up); }
        .dot { height: 8px; width: 8px; background: var(--up); border-radius: 50%; animation: pulse 1.5s infinite; }

        /* Tabs */
        .tabs { display: flex; background: var(--card); border-radius: 12px; padding: 5px; margin: 20px 0; border: 1px solid var(--border); }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: none; color: var(--sub);
            border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent); color: white; }

        /* List Area */
        .list-box { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 20px; border-bottom: 1px solid var(--border); 
        }
        .item:last-child { border: none; }

        /* Left Section */
        .left { display: flex; align-items: center; gap: 15px; }
        .icon { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .icon img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .name-box { display: flex; flex-direction: column; }
        .sym { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 16px; }
        .full { font-size: 11px; color: var(--sub); text-transform: uppercase; margin-top: 2px; }

        /* Right Section */
        .right { text-align: right; }
        .price { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 16px; }
        .chg { font-size: 11px; font-weight: 600; margin-top: 4px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        /* Search */
        #searchInput {
            width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; color: white; margin-bottom: 15px; outline: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ORBICXS <b>FINANCE</b></h1>
        <div class="live-dot"><div class="dot"></div> LIVE DATA</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-fiat" onclick="switchTab('fiat')">VALYUTA (CBU)</button>
        <button class="tab-btn" id="btn-crypto" onclick="switchTab('crypto')">KRIPTO (BINANCE)</button>
    </div>

    <input type="text" id="searchInput" placeholder="Qidiruv..." onkeyup="filterItems()">

    <div id="mainList" class="list-box">
        </div>
</div>

<script>
    let currentMode = 'fiat';
    let socket;

    // 1. Valyuta bayroqlari
    const fiatData = {
        "USD": "🇺🇸", "EUR": "🇪🇺", "RUB": "🇷🇺", "GBP": "🇬🇧", "JPY": "🇯🇵", 
        "TRY": "🇹🇷", "KZT": "🇰🇿", "AED": "🇦🇪", "CNY": "🇨🇳", "CHF": "🇨🇭"
    };

    // 2. Kripto aktivlar
    const cryptoData = ["BTC", "ETH", "BNB", "SOL", "XRP", "ADA", "AVAX", "DOGE", "DOT", "MATIC"];

    // 3. Markaziy Bank kurslarini olish
    async function loadCbu() {
        try {
            const res = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
            const data = await res.json();
            const container = document.getElementById('mainList');
            container.innerHTML = "";

            data.forEach(item => {
                if(fiatData[item.Ccy]) {
                    renderRow(item.Ccy, item.CcyNm_UZ, fiatData[item.Ccy], 
                              parseFloat(item.Rate).toLocaleString() + " UZS", "Markaziy Bank", false);
                }
            });
        } catch (e) { console.error("CBU error"); }
    }

    // 4. Binance Kripto (WebSocket)
    function loadCrypto() {
        const container = document.getElementById('mainList');
        container.innerHTML = "";

        cryptoData.forEach(s => {
            const img = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${s.toLowerCase()}.png`;
            renderRow(s, "Kripto Aktiv", `<img src="${img}">`, "Yuklanmoqda...", "Binance Live", true);
        });

        if (socket) socket.close();
        socket = new WebSocket(`wss://stream.binance.com:9443/ws/${cryptoData.map(s => s.toLowerCase() + 'usdt@ticker').join('/')}`);

        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const sym = data.s.replace('USDT', '');
            const priceEl = document.getElementById('price-' + sym);
            const chgEl = document.getElementById('chg-' + sym);

            if (priceEl) priceEl.innerText = "$ " + parseFloat(data.c).toLocaleString();
            if (chgEl) {
                chgEl.innerText = (parseFloat(data.P) >= 0 ? '+' : '') + data.P + "%";
                chgEl.style.color = parseFloat(data.P) >= 0 ? 'var(--up)' : 'var(--down)';
            }
        };
    }

    function renderRow(sym, name, icon, price, info, isCrypto) {
        const container = document.getElementById('mainList');
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <div class="left">
                <div class="icon">${icon}</div>
                <div class="name-box">
                    <span class="sym">${sym}</span>
                    <span class="full">${name}</span>
                </div>
            </div>
            <div class="right">
                <div class="price" id="price-${sym}">${price}</div>
                <div class="chg" id="chg-${sym}">${info}</div>
            </div>
        `;
        container.appendChild(div);
    }

    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('btn-fiat').classList.toggle('active', mode === 'fiat');
        document.getElementById('btn-crypto').classList.toggle('active', mode === 'crypto');
        if (socket) socket.close();
        mode === 'fiat' ? loadCbu() : loadCrypto();
    }

    function filterItems() {
        const val = document.getElementById('searchInput').value.toUpperCase();
        document.querySelectorAll('.item').forEach(item => {
            item.style.display = item.innerText.toUpperCase().includes(val) ? 'flex' : 'none';
        });
    }

    // Start
    loadCbu();
</script>
</body>
</html>
