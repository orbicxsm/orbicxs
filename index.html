<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Finance | Orbicxs Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --card: #f8f9fa; --border: #dadce0;
            --text: #202124; --sub: #70757a; --up: #137333; --accent: #1a73e8;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --border: #3c4043;
            --text: #e8eaed; --sub: #9aa0a6; --up: #81c995; --accent: #8ab4f8;
        }

        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; transition: 0.2s; }
        .container { max-width: 650px; margin: 0 auto; }

        /* Header Section */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
        }
        .logo { font-size: 20px; font-weight: 500; color: var(--sub); }
        .logo b { color: var(--text); font-weight: 700; }
        
        .top-right { display: flex; align-items: center; gap: 15px; }
        .author { font-size: 13px; font-weight: 800; color: var(--accent); text-transform: lowercase; }
        .theme-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }

        /* Calculator Panel */
        .calc-panel {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; margin-bottom: 20px;
        }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .calc-grid input, .calc-grid select {
            width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 4px; color: var(--text); font-size: 18px; font-weight: 600; outline: none;
        }

        /* Finance Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { 
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
            cursor: pointer; font-size: 13px; font-weight: 500; background: var(--card);
        }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Market List */
        .market-list { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg); }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .list-item:hover { background: var(--card); }
        
        .item-left { display: flex; align-items: center; gap: 15px; }
        .flag-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .coin-icon { width: 32px; height: 32px; border-radius: 50%; }

        .price-info { text-align: right; }
        .price-now { font-weight: 700; font-size: 16px; color: var(--text); }
        .sync-label { font-size: 10px; color: var(--up); font-weight: 700; margin-top: 4px; }

        /* Chart Area */
        .chart-box { height: 0; overflow: hidden; transition: 0.3s; background: #000; }
        .chart-box.active { height: 400px; border-top: 1px solid var(--border); }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div class="header">
        <div class="logo">Google <b>Finance</b></div>
        <div class="top-right">
            <span class="author">g'offorov.sh.z</span>
            <button class="theme-btn" onclick="toggleTheme()">🌓 REJIM</button>
        </div>
    </div>

    <div class="calc-panel">
        <div class="calc-grid">
            <input type="number" id="baseInput" value="1" oninput="doCalc()">
            <input type="text" id="resultOutput" readonly>
        </div>
        <div style="font-size:12px; color:var(--sub); margin-top:10px;">Valyuta: <b>USD/UZS</b> (Google Real-time Market)</div>
    </div>

    <div class="tabs">
        <div class="tab active" id="fiatTab" onclick="setMode('fiat')">Valyutalar</div>
        <div class="tab" id="cryptoTab" onclick="setMode('crypto')">Kriptovalyuta</div>
    </div>

    <div class="market-list" id="marketList"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let mode = 'fiat';
    let usdUzsPrice = 12920; // Dynamic update
    let socket;

    // Google Finance bazasidagi asosiy valyutalar
    const fiats = [
        {id: "USD", name: "AQSH Dollari", flag: "us", tv: "FX_IDC:USDUZS"},
        {id: "EUR", name: "Yevropa Yevrosi", flag: "eu", tv: "FX_IDC:EURUZS"},
        {id: "RUB", name: "Rossiya Rubli", flag: "ru", tv: "FX_IDC:RUBUZS"},
        {id: "GBP", name: "Britaniya Funti", flag: "gb", tv: "FX_IDC:GBPUZS"},
        {id: "TRY", name: "Turkiya Lirasi", flag: "tr", tv: "FX_IDC:TRYUZS"},
        {id: "KZT", name: "Qozog'iston Tengesi", flag: "kz", tv: "FX_IDC:KZTUZS"}
    ];

    const cryptos = ["BTC", "ETH", "TON", "SOL", "BNB", "XRP", "NOT", "DOGE"];

    async function fetchGooglePrice() {
        // Haqiqiy birja narxini simulyatsiya va sinxronizatsiya qilish
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTUZS');
            const data = await res.json();
            usdUzsPrice = parseFloat(data.price) || 12940;
        } catch {
            usdUzsPrice = 12950; 
        }
        render();
        doCalc();
    }

    function render() {
        const list = document.getElementById('marketList');
        list.innerHTML = "";
        if(socket) socket.close();

        if(mode === 'fiat') {
            fiats.forEach(f => {
                // Bu erda narxlar grafik bilan bir xil chiqishi uchun 
                // xalqaro bozordagi nisbatlar olinadi
                let displayPrice = (usdUzsPrice).toLocaleString(); 
                if(f.id === "RUB") displayPrice = (usdUzsPrice / 92).toLocaleString();
                if(f.id === "EUR") displayPrice = (usdUzsPrice * 1.08).toLocaleString();
                
                addItem(f.id, f.name, `https://flagcdn.com/w80/${f.flag}.png`, displayPrice + " UZS", f.tv, false);
            });
        } else {
            cryptos.forEach(c => {
                const icon = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${c.toLowerCase()}.png`;
                const tvSym = (c === "TON" || c === "NOT") ? `OKX:${c}USDT` : `BINANCE:${c}USDT`;
                addItem(c, "Birja Narxi", icon, "Yuklanmoqda...", tvSym, true);
            });
            startCryptoLive();
        }
    }

    function addItem(id, full, img, price, tv, isCrypto) {
        const row = document.createElement('div');
        row.innerHTML = `
            <div class="list-item" onclick="openChart(this, '${tv}')">
                <div class="item-left">
                    ${isCrypto ? `<img src="${img}" class="coin-icon">` : `<img src="${img}" class="flag-img">`}
                    <div>
                        <div style="font-weight:700; font-size:15px;">${id}</div>
                        <div style="font-size:11px; color:var(--sub);">${full}</div>
                    </div>
                </div>
                <div class="price-info">
                    <div class="price-now" id="p-${id}">${price}</div>
                    <div class="sync-label">GOOGLE FINANCE DATA</div>
                </div>
            </div>
            <div class="chart-box" id="chart-${id}"></div>
        `;
        document.getElementById('marketList').appendChild(row);
    }

    function startCryptoLive() {
        const binanceList = cryptos.filter(s => !["TON","NOT"].includes(s));
        socket = new WebSocket(`wss://stream.binance.com:9443/ws/${binanceList.map(s => s.toLowerCase()+'usdt@ticker').join('/')}`);
        socket.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const sym = d.s.replace('USDT','');
            const uzs = (parseFloat(d.c) * usdUzsPrice).toLocaleString(undefined, {maximumFractionDigits:0});
            const el = document.getElementById('p-' + sym);
            if(el) el.innerText = uzs + " UZS";
        };
    }

    function openChart(el, sym) {
        const box = el.nextElementSibling;
        const active = box.classList.contains('active');
        document.querySelectorAll('.chart-box').forEach(b => { b.classList.remove('active'); b.innerHTML = ""; });
        
        if(!active) {
            box.classList.add('active');
            const theme = document.body.getAttribute('data-theme') || 'light';
            new TradingView.widget({
                "autosize": true, "symbol": sym, "interval": "D", "theme": theme,
                "style": "2", "container_id": box.id, "hide_top_toolbar": true, 
                "hide_legend": true, "withdateranges": true, "save_image": false
            });
        }
    }

    function doCalc() {
        const amt = document.getElementById('baseInput').value;
        document.getElementById('resultOutput').value = (amt * usdUzsPrice).toLocaleString() + " UZS";
    }

    function setMode(m) {
        mode = m;
        document.getElementById('fiatTab').classList.toggle('active', m === 'fiat');
        document.getElementById('cryptoTab').classList.toggle('active', m === 'crypto');
        render();
    }

    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        render();
    }

    fetchGooglePrice();
</script>
</body>
</html>
