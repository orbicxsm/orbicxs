<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Finance Terminal | Orbicxs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --card: #f8f9fa; --border: #dadce0;
            --text: #202124; --sub: #70757a; --up: #137333; --accent: #1a73e8; --red: #d93025;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --border: #3c4043;
            --text: #e8eaed; --sub: #9aa0a6; --up: #81c995; --accent: #8ab4f8; --red: #f28b82;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 10px;
            transition: 0.3s;
        }

        .container { max-width: 650px; margin: 0 auto; position: relative; }

        /* Top Header */
        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px;
        }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 1px; color: var(--sub); }
        .logo b { color: var(--text); }
        .top-ctrl { display: flex; align-items: center; gap: 15px; }
        .author { font-size: 13px; font-weight: 800; color: var(--accent); }
        .theme-btn { 
            background: var(--card); border: 1px solid var(--border); 
            color: var(--text); padding: 6px 12px; border-radius: 4px; 
            cursor: pointer; font-size: 11px; font-weight: 600;
        }

        /* Calculator */
        .calc-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 15px;
        }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .calc-grid input {
            width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono'; font-weight: 700; font-size: 18px; outline: none; box-sizing: border-box;
        }

        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-item { 
            flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--card);
            border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 700; text-align: center;
        }
        .tab-item.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* List Area */
        .list-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .list-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .list-row:hover { background: var(--card); }
        .row-l { display: flex; align-items: center; gap: 15px; }
        .f-img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }
        
        .name-info { display: flex; flex-direction: column; }
        .sym-code { font-weight: 700; font-size: 15px; }
        .full-name { font-size: 10px; color: var(--sub); }

        .price-info { text-align: right; }
        .live-price { font-family: 'JetBrains Mono'; font-weight: 700; color: var(--text); font-size: 15px; }
        .status-tag { font-size: 9px; color: var(--up); font-weight: 800; }

        /* Chart */
        .chart-wrap { height: 0; overflow: hidden; transition: 0.3s ease; background: var(--bg); }
        .chart-wrap.active { height: 400px; border-top: 1px solid var(--border); }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div class="header-top">
        <div class="logo">Google <b>Finance</b></div>
        <div class="top-ctrl">
            <span class="author">g'offorov.sh.z</span>
            <button class="theme-btn" onclick="toggleTheme()">🌓 REJIM</button>
        </div>
    </div>

    <div class="calc-box">
        <div class="calc-grid">
            <input type="number" id="amtIn" value="1" oninput="runCalc()">
            <input type="text" id="amtOut" readonly>
        </div>
        <div style="font-size:11px; color:var(--sub); margin-top:10px; text-align:center; font-weight:600;">USD / UZS • GOOGLE REAL-TIME MARKET</div>
    </div>

    <div class="tabs">
        <div class="tab-item active" id="fiat-tab" onclick="setMode('fiat')">VALYUTALAR</div>
        <div class="tab-item" id="crypto-tab" onclick="setMode('crypto')">BINANCE KRIPTO</div>
    </div>

    <div class="list-card" id="dataList"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let mode = 'fiat';
    let usdUzsRate = 12950;
    let socket;

    const fiatList = [
        {ccy: "USD", name: "AQSH Dollari", flag: "us", sym: "FX_IDC:USDUZS"},
        {ccy: "EUR", name: "Yevro", flag: "eu", sym: "FX_IDC:EURUZS"},
        {ccy: "RUB", name: "Rossiya Rubli", flag: "ru", sym: "FX_IDC:RUBUZS"},
        {ccy: "GBP", name: "Britaniya Funti", flag: "gb", sym: "FX_IDC:GBPUZS"},
        {ccy: "TRY", name: "Turkiya Lirasi", flag: "tr", sym: "FX_IDC:TRYUZS"},
        {ccy: "KZT", name: "Qozog'iston Tengesi", flag: "kz", sym: "FX_IDC:KZTUZS"}
    ];

    const cryptoList = ["BTC", "ETH", "TON", "SOL", "BNB", "XRP", "NOT", "DOGE"];

    async function getLiveUSD() {
        try {
            // Binance orqali Google Finance darajasidagi aniq UZS kursini olish
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTUZS');
            const data = await res.json();
            usdUzsRate = parseFloat(data.price);
            runCalc();
            render();
        } catch (e) { render(); }
    }

    function render() {
        const container = document.getElementById('dataList');
        container.innerHTML = "";
        if(socket) socket.close();

        if(mode === 'fiat') {
            fiatList.forEach(f => {
                let priceDisplay = "Google Data";
                if(f.ccy === "USD") priceDisplay = usdUzsRate.toLocaleString() + " UZS";
                buildRow(f.ccy, f.name, `https://flagcdn.com/w80/${f.flag}.png`, priceDisplay, f.sym, false);
            });
        } else {
            cryptoList.forEach(s => {
                const icon = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${s.toLowerCase()}.png`;
                const tvSym = (s === "TON" || s === "NOT") ? `OKX:${s}USDT` : `BINANCE:${s}USDT`;
                buildRow(s, "Binance Live", icon, "Yuklanmoqda...", tvSym, true);
            });
            connectWS();
        }
    }

    function buildRow(id, full, img, price, tv, isCrypto) {
        const item = document.createElement('div');
        item.innerHTML = `
            <div class="list-row" onclick="showChart(this, '${tv}')">
                <div class="row-l">
                    <img src="${img}" class="f-img">
                    <div class="name-info">
                        <span class="sym-code">${id}${isCrypto ? '/USDT' : '/UZS'}</span>
                        <span class="full-name">${full}</span>
                    </div>
                </div>
                <div class="price-info">
                    <div class="live-price" id="price-${id}">${price}</div>
                    <div class="status-tag">GOOGLE SYNC</div>
                </div>
            </div>
            <div class="chart-wrap" id="wrap-${id}"></div>
        `;
        document.getElementById('dataList').appendChild(item);
    }

    function connectWS() {
        const binanceSymbols = cryptoList.filter(s => !["TON","NOT"].includes(s));
        socket = new WebSocket(`wss://stream.binance.com:9443/ws/${binanceSymbols.map(s => s.toLowerCase()+'usdt@ticker').join('/')}`);
        socket.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const sym = d.s.replace('USDT','');
            const price = parseFloat(d.c);
            const el = document.getElementById('price-' + sym);
            if(el) {
                el.innerText = price > 1 ? price.toLocaleString() : price.toFixed(4);
                el.style.color = parseFloat(d.P) >= 0 ? 'var(--up)' : 'var(--red)';
            }
        };
    }

    function showChart(el, sym) {
        const box = el.nextElementSibling;
        const active = box.classList.contains('active');
        document.querySelectorAll('.chart-wrap').forEach(b => { b.classList.remove('active'); b.innerHTML = ""; });
        
        if(!active) {
            box.classList.add('active');
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            new TradingView.widget({
                "autosize": true, "symbol": sym, "interval": "D", 
                "theme": isDark ? "dark" : "light",
                "style": "2", "container_id": box.id, 
                "hide_top_toolbar": true, "hide_legend": true, "save_image": false
            });
        }
    }

    function runCalc() {
        const val = document.getElementById('amtIn').value;
        document.getElementById('amtOut').value = (val * usdUzsRate).toLocaleString() + " UZS";
    }

    function setMode(m) {
        mode = m;
        document.getElementById('fiat-tab').classList.toggle('active', m==='fiat');
        document.getElementById('crypto-tab').classList.toggle('active', m==='crypto');
        render();
    }

    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        render();
    }

    getLiveUSD();
</script>
</body>
</html>
