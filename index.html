<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs | Valyuta va Kripto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #00d1ff;
            --text: #ffffff; --sub: #888888; --border: #222;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-weight: 800; letter-spacing: 5px; color: var(--accent); margin: 0; }

        /* Qidiruv */
        .search-container { margin-bottom: 25px; width: 100%; }
        #searchInput {
            width: 100%; padding: 15px 20px; background: var(--card);
            border: 1px solid var(--border); border-radius: 12px;
            color: #fff; font-size: 16px; transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--accent); outline: none; }

        /* Bo'limlar - Grid */
        .market-sections {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }

        .section-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 15px; overflow: hidden; height: fit-content;
        }

        .section-title {
            padding: 15px; background: #1a1a1a; font-weight: bold;
            text-align: center; border-bottom: 1px solid var(--border);
            text-transform: uppercase; letter-spacing: 2px; font-size: 14px;
        }

        /* Aktivlar ro'yxati */
        .asset-list { padding: 10px; }
        .asset-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #1a1a1a; transition: 0.2s;
        }
        .asset-item:last-child { border: none; }
        .asset-item:hover { background: #1a1a1a; }

        .info-part { display: flex; align-items: center; gap: 12px; }
        .flag { font-size: 24px; }
        .details { display: flex; flex-direction: column; }
        .sym { font-weight: bold; font-size: 16px; }
        .full { font-size: 11px; color: var(--sub); }

        .price-part { text-align: right; font-family: 'JetBrains Mono', monospace; }
        .uzs-val { font-size: 15px; font-weight: bold; color: #39d353; }
        .usd-val { font-size: 11px; color: var(--sub); margin-top: 2px; }

        /* Mobil qurilmalar */
        @media (max-width: 768px) {
            .market-sections { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>ORBICXS</h1>
            <p style="color: #555; font-size: 12px;">GLOBAL VALYUTA VA KRIPTO MONITORINGI</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Valyuta yoki Kriptoni qidirish..." onkeyup="filterData()">
        </div>

        <div class="market-sections">
            <div class="section-box">
                <div class="section-title">Valyuta Bozorlari (UZS)</div>
                <div id="fiat-list" class="asset-list">
                    </div>
            </div>

            <div class="section-box">
                <div class="section-title">Kripto Aktivlar (UZS)</div>
                <div id="crypto-list" class="asset-list">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // Valyuta ma'lumotlari (16 ta asosiy)
        const fiatAssets = [
            {id: "USD", name: "AQSH Dollari", flag: "🇺🇸"},
            {id: "EUR", name: "Yevro", flag: "🇪🇺"},
            {id: "RUB", name: "Rossiya Rubli", flag: "🇷🇺"},
            {id: "GBP", name: "Britaniya Funti", flag: "🇬🇧"},
            {id: "JPY", name: "Yaponiya Yenasi", flag: "🇯🇵"},
            {id: "TRY", name: "Turkiya Lirasi", flag: "🇹🇷"},
            {id: "CNY", name: "Xitoy Yuani", flag: "🇨🇳"},
            {id: "AED", name: "BAA Dirhami", flag: "🇦🇪"},
            {id: "CHF", name: "Shveytsariya Franki", flag: "🇨🇭"},
            {id: "CAD", name: "Kanada Dollari", flag: "🇨🇦"},
            {id: "AUD", name: "Avstraliya Dollari", flag: "🇦🇺"},
            {id: "KZT", name: "Qozog'iston Tengesi", flag: "🇰🇿"},
            {id: "KRW", name: "Koreya Vonasi", flag: "🇰🇷"},
            {id: "SAR", name: "Saudiya Riyoli", flag: "🇸🇦"},
            {id: "INR", name: "Hindiston Rupiyasi", flag: "🇮🇳"},
            {id: "MYR", name: "Malayziya Ringgiti", flag: "🇲🇾"}
        ];

        // Kripto ma'lumotlari (16 ta asosiy)
        const cryptoAssets = [
            {id: "BTC", name: "Bitcoin", flag: "₿"},
            {id: "ETH", name: "Ethereum", flag: "Ξ"},
            {id: "BNB", name: "BNB", flag: "🔶"},
            {id: "SOL", name: "Solana", flag: "☀️"},
            {id: "XRP", name: "Ripple", flag: "✕"},
            {id: "ADA", name: "Cardano", flag: "₳"},
            {id: "AVAX", name: "Avalanche", flag: "🔺"},
            {id: "DOGE", name: "Dogecoin", flag: "Ð"},
            {id: "DOT", name: "Polkadot", flag: "●"},
            {id: "TRX", name: "TRON", flag: "💎"},
            {id: "LINK", name: "Chainlink", flag: "🔗"},
            {id: "MATIC", name: "Polygon", flag: "💜"},
            {id: "LTC", name: "Litecoin", flag: "Ł"},
            {id: "SHIB", name: "Shiba Inu", flag: "🐕"},
            {id: "UNI", name: "Uniswap", flag: "🦄"},
            {id: "BCH", name: "Bitcoin Cash", flag: "💵"}
        ];

        async function updateMarket() {
            try {
                // API dan barcha kurslarni olish
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                const uzsBase = data.rates.UZS;

                // Valyutalarni chiqarish
                const fiatContainer = document.getElementById('fiat-list');
                fiatContainer.innerHTML = '';
                fiatAssets.forEach(f => {
                    const rateInUSD = data.rates[f.id];
                    const rateInUZS = (uzsBase / rateInUSD).toFixed(2);
                    
                    fiatContainer.innerHTML += createItem(f.flag, f.id, f.name, rateInUZS, "1 " + f.id);
                });

                // Kriptolarni chiqarish (Binance orqali USD ga nisbatan)
                const cryptoContainer = document.getElementById('crypto-list');
                cryptoContainer.innerHTML = '';
                
                // Kripto narxlarini olish
                for (let c of cryptoAssets) {
                    try {
                        const cRes = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${c.id}USDT`);
                        const cData = await cRes.json();
                        const priceInUSD = parseFloat(cData.price);
                        const priceInUZS = (priceInUSD * uzsBase).toLocaleString();
                        
                        cryptoContainer.innerHTML += createItem(c.flag, c.id, c.name, priceInUZS, "$" + priceInUSD.toLocaleString());
                    } catch(e) {
                        cryptoContainer.innerHTML += createItem(c.flag, c.id, c.name, "Yuklanmoqda...", "USD");
                    }
                }

            } catch (e) {
                console.error("Ma'lumot olishda xatolik:", e);
            }
        }

        function createItem(flag, sym, full, uzs, usd) {
            return `
                <div class="asset-item">
                    <div class="info-part">
                        <div class="flag">${flag}</div>
                        <div class="details">
                            <span class="sym">${sym}</span>
                            <span class="full">${full}</span>
                        </div>
                    </div>
                    <div class="price-part">
                        <div class="uzs-val">${uzs} UZS</div>
                        <div class="usd-val">${usd}</div>
                    </div>
                </div>
            `;
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toUpperCase();
            document.querySelectorAll('.asset-item').forEach(item => {
                const text = item.innerText.toUpperCase();
                item.style.display = text.includes(query) ? 'flex' : 'none';
            });
        }

        updateMarket();
        setInterval(updateMarket, 60000); // Har daqiqada yangilash
    </script>
</body>
</html>
