<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs | Google Finance Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --card: #f8f9fa; --border: #dadce0;
            --text: #202124; --sub: #70757a; --up: #137333; --accent: #1a73e8;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --border: #3c4043;
            --text: #e8eaed; --sub: #9aa0a6; --up: #81c995; --accent: #8ab4f8;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 15px;
            transition: background 0.2s;
        }

        .container { max-width: 680px; margin: 0 auto; }

        /* Google Style Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
        }
        .logo { font-size: 20px; color: var(--sub); font-weight: 400; }
        .logo b { color: var(--text); }
        
        .controls { display: flex; align-items: center; gap: 15px; }
        .author { font-size: 13px; font-weight: 600; color: var(--accent); }
        .theme-btn { 
            background: none; border: 1px solid var(--border); color: var(--text);
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }

        /* Calculator Section */
        .calc-section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; margin-bottom: 20px;
        }
        .calc-title { font-size: 14px; margin-bottom: 10px; color: var(--sub); font-weight: 500; }
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .calc-row input, .calc-row select {
            width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 4px; color: var(--text); font-size: 16px; outline: none;
        }
        .calc-row input:focus { border-color: var(--accent); }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { 
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
            cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s;
        }
        .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Finance List */
        .finance-list { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
            transition: background 0.1s;
        }
        .list-item:hover { background: var(--card); }
        .item-left { display: flex; align-items: center; gap: 16px; }
        .flag-circle { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; border: 1px solid var(--border); }
        .flag-circle img { width: 100%; height: 100%; object-fit: cover; }
        .coin-icon { width: 32px; height: 32px; border-radius: 50%; }

        .name-meta { display: flex; flex-direction: column; }
        .ticker { font-weight: 600; font-size: 15px; }
        .full-name { font-size: 12px; color: var(--sub); }

        .item-right { text-align: right; }
        .price-val { font-family: 'Roboto Mono', monospace; font-weight: 600; font-size: 15px; color: var(--text); }
        .change-up { color: var(--up); font-size: 12px; margin-top: 2px; font-weight: 500; }

        /* Chart Area */
        .chart-box { height: 0; overflow: hidden; transition: 0.3s; background: var(--bg); }
        .chart-box.active { height: 400px; border-top: 1px solid var(--border); }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div class="header">
        <div class="logo">Google <b>Finance</b> | Orbicxs</div>
        <div class="controls">
            <span class="author">g'offorov.sh.z</span>
            <button class="theme-btn" onclick="toggleTheme()">Soliq/Tungi</button>
        </div>
    </div>

    <div class="calc-section">
        <div class="calc-title">Valyuta konvertatsiyasi</div>
        <div class="calc-row">
            <div>
                <input type="number" id="baseInput" value="1" oninput="calculate()">
                <select id="currencySelect" style="margin-top:8px" onchange="calculate()"></select>
            </div>
            <div>
                <input type="text" id="resultInput" readonly>
                <div style="font-size:11px; color:var(--sub); margin-top:8px; text-align:center;">O'zbekiston So'mi (UZS)</div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" id="fiatTab" onclick="switchMode('fiat')">Valyutalar</div>
        <div class="tab" id="cryptoTab" onclick="switchMode('crypto')">Kriptovalyutalar</div>
    </div>

    <div class="finance-list" id="financeContainer"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let mode = 'fiat';
    let rates = {};
    let uzsUsd = 12900;
    let socket;

    const cryptos = ["BTC", "ETH", "TON", "SOL", "BNB", "XRP", "ADA", "NOT", "DOGS", "TRX", "LTC", "PEPE"];

    async function init() {
        try {
            const res = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
            const data = await res.json();
            
            const select = document.getElementById('currencySelect');
            data.forEach(c => {
                rates[c.Ccy] = parseFloat(c.Rate);
                if(c.Ccy === 'USD') uzsUsd = parseFloat(c.Rate);
                
                const opt = document.createElement('option');
                opt.value = c.Ccy; opt.innerText = `${c.Ccy} - ${c.CcyNm_UZ}`;
                select.appendChild(opt);
            });
            render();
            calculate();
        } catch (e) { console.error("API error"); }
    }

    function render() {
        const container = document.getElementById('financeContainer');
        container.innerHTML = "";
        if(socket) socket.close();

        if(mode === 'fiat') {
            Object.keys(rates).forEach(ccy => {
                // Faqat asosiy va Google Finance dagi valyutalar
                const important = ["USD","EUR","RUB","GBP","TRY","KZT","CNY","JPY","CHF","AED","CAD"];
                if(important.includes(ccy)) {
                    const flag = `https://flagcdn.com/w80/${ccy === 'EUR' ? 'eu' : ccy.substring(0,2).toLowerCase()}.png`;
                    // Google Finance dan olingan grafik symboli
                    const tvSym = `FX_IDC:${ccy}UZS`;
                    createRow(ccy, "Valyuta kursi", flag, rates[ccy].toLocaleString() + " UZS", tvSym, false);
                }
            });
        } else {
            cryptos.forEach(s => {
                const icon = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${s.toLowerCase()}.png`;
                const tvSym = (s === "TON" || s === "NOT" || s === "DOGS") ? `OKX:${s}USDT` : `BINANCE:${s}USDT`;
                createRow(s, "Kripto aktiv", icon, "Yuklanmoqda...", tvSym, true);
            });
            startCryptoLive();
        }
    }

    function createRow(id, meta, img, price, tv, isCrypto) {
        const row = document.createElement('div');
        row.innerHTML = `
            <div class="list-item" onclick="toggleChart(this, '${tv}')">
                <div class="item-left">
                    ${isCrypto ? `<img src="${img}" class="coin-icon">` : `<div class="flag-circle"><img src="${img}"></div>`}
                    <div class="name-meta">
                        <span class="ticker">${id}</span>
                        <span class="full-name">${meta}</span>
                    </div>
                </div>
                <div class="item-right">
                    <div class="price-val" id="price-${id}">${price}</div>
                    <div class="change-up">Google Finance Data</div>
                </div>
            </div>
            <div class="chart-box" id="box-${id}"></div>
        `;
        document.getElementById('financeContainer').appendChild(row);
    }

    function startCryptoLive() {
        const standardCryptos = cryptos.filter(s => !["TON","NOT","DOGS"].includes(s));
        socket = new WebSocket(`wss://stream.binance.com:9443/ws/${standardCryptos.map(s => s.toLowerCase()+'usdt@ticker').join('/')}`);
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const sym = data.s.replace('USDT','');
            const uzsPrice = (parseFloat(data.c) * uzsUsd).toLocaleString(undefined, {maximumFractionDigits:0});
            const el = document.getElementById('price-' + sym);
            if(el) el.innerText = uzsPrice + " UZS";
        };
    }

    function toggleChart(el, sym) {
        const box = el.nextElementSibling;
        const isActive = box.classList.contains('active');
        document.querySelectorAll('.chart-box').forEach(b => { b.classList.remove('active'); b.innerHTML = ""; });
        
        if(!isActive) {
            box.classList.add('active');
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
            new TradingView.widget({
                "autosize": true, "symbol": sym, "interval": "D", "theme": theme,
                "style": "2", "container_id": box.id, "hide_top_toolbar": true, 
                "hide_legend": true, "withdateranges": true
            });
        }
    }

    function calculate() {
        const val = document.getElementById('baseInput').value;
        const cur = document.getElementById('currencySelect').value;
        document.getElementById('resultInput').value = (val * (rates[cur]||0)).toLocaleString() + " UZS";
    }

    function switchMode(m) {
        mode = m;
        document.getElementById('fiatTab').classList.toggle('active', m === 'fiat');
        document.getElementById('cryptoTab').classList.toggle('active', m === 'crypto');
        render();
    }

    function toggleTheme() {
        const b = document.body;
        const isDark = b.getAttribute('data-theme') === 'dark';
        b.setAttribute('data-theme', isDark ? 'light' : 'dark');
        render();
    }

    init();
</script>
</body>
</html>
