<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbicxs Terminal | Crypto & Fiat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --side: #161b22;
            --accent: #58a6ff;
            --up: #39d353;
            --down: #f85149;
            --text: #c9d1d9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar - Narxlar ro'yxati */
        .sidebar {
            width: 350px;
            background: var(--side);
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }

        .brand {
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            color: var(--accent);
            text-align: center;
            border-bottom: 1px solid #30363d;
            letter-spacing: 2px;
        }

        /* Tab menyusi */
        .tabs {
            display: flex;
            background: #0d1117;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .asset-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .asset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .asset-item:hover { background: #21262d; }

        .asset-info .name { font-weight: bold; font-size: 14px; display: block; }
        .asset-info .sub { font-size: 11px; color: #8b949e; }

        .asset-price { text-align: right; }
        .val { font-family: 'monospace'; font-size: 15px; font-weight: bold; }
        .chg { font-size: 11px; font-weight: bold; }

        /* Main Content - Grafik */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #tv-chart { flex: 1; }

        /* Miltillash effekti */
        .flash-up { color: var(--up) !important; transition: 0.2s; }
        .flash-down { color: var(--down) !important; transition: 0.2s; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">ORBICXS <span style="color:white">X</span></div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('crypto')">KRIPTO</button>
            <button class="tab-btn" onclick="showTab('fiat')">VALYUTA</button>
        </div>

        <div id="crypto-list" class="asset-list">
            <div class="asset-item" onclick="changeChart('BINANCE:BTCUSDT')">
                <div class="asset-info">
                    <span class="name">BTC / USDT</span>
                    <span class="sub">Bitcoin</span>
                </div>
                <div class="asset-price">
                    <div class="val" id="btc-val">Loading...</div>
                    <div class="chg" id="btc-chg">0.00%</div>
                </div>
            </div>
            <div class="asset-item" onclick="changeChart('BINANCE:ETHUSDT')">
                <div class="asset-info">
                    <span class="name">ETH / USDT</span>
                    <span class="sub">Ethereum</span>
                </div>
                <div class="asset-price">
                    <div class="val" id="eth-val">Loading...</div>
                    <div class="chg" id="eth-chg">0.00%</div>
                </div>
            </div>
        </div>

        <div id="fiat-list" class="asset-list" style="display:none;">
            <div class="asset-item" onclick="changeChart('FX_IDC:USDUZS')">
                <div class="asset-info">
                    <span class="name">USD / UZS</span>
                    <span class="sub">Dollar / So'm</span>
                </div>
                <div class="asset-price">
                    <div class="val" id="uzs-val">12,650</div>
                    <div class="chg" style="color:var(--up)">Live</div>
                </div>
            </div>
            <div class="asset-item" onclick="changeChart('FX:EURUSD')">
                <div class="asset-info">
                    <span class="name">EUR / USD</span>
                    <span class="sub">Yevro / Dollar</span>
                </div>
                <div class="asset-price">
                    <div class="val" id="eur-val">1.0820</div>
                    <div class="chg" id="eur-chg">Global</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="tv-chart"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 1. Varaqalarni almashtirish (Crypto/Fiat)
        function showTab(type) {
            document.querySelectorAll('.asset-list').forEach(l => l.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(type + '-list').style.display = 'block';
            event.target.classList.add('active');
        }

        // 2. Grafikni yangilash
        let currentSymbol = "BINANCE:BTCUSDT";
        let widget = null;

        function loadChart(symbol) {
            widget = new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "H",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "uz",
                "container_id": "tv-chart",
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "details": true,
                "hotlist": true,
                "calendar": true,
            });
        }

        function changeChart(symbol) {
            loadChart(symbol);
        }

        loadChart(currentSymbol);

        // 3. Haqiqiy vaqtda Kriptovalyuta (Binance WebSocket)
        const btcWs = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        const ethWs = new WebSocket('wss://stream.binance.com:9443/ws/ethusdt@ticker');

        function updateUI(id, data) {
            const valEl = document.getElementById(id + '-val');
            const chgEl = document.getElementById(id + '-chg');
            const price = parseFloat(data.c).toLocaleString(undefined, {minimumFractionDigits: 2});
            
            // Miltillash
            const oldPrice = parseFloat(valEl.innerText.replace(/,/g, ''));
            if (parseFloat(data.c) > oldPrice) valEl.className = 'val flash-up';
            else if (parseFloat(data.c) < oldPrice) valEl.className = 'val flash-down';
            setTimeout(() => valEl.className = 'val', 300);

            valEl.innerText = price;
            chgEl.innerText = (data.P > 0 ? '+' : '') + data.P + '%';
            chgEl.style.color = data.P >= 0 ? 'var(--up)' : 'var(--down)';
        }

        btcWs.onmessage = (e) => updateUI('btc', JSON.parse(e.data));
        ethWs.onmessage = (e) => updateUI('eth', JSON.parse(e.data));

        // 4. Fiat API (USD/UZS)
        async function fetchFiat() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                document.getElementById('uzs-val').innerText = data.rates.UZS.toLocaleString();
                document.getElementById('eur-val').innerText = data.rates.EUR.toFixed(4);
            } catch(e) {}
        }
        setInterval(fetchFiat, 60000);
        fetchFiat();

    </script>
</body>
</html>
