<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Orbicxs Home</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: white; overflow: hidden;
        }
        .container { text-align: center; width: 100%; max-width: 800px; }
        .logo {
            font-size: 5rem; font-weight: 900; color: #00ccff;
            text-shadow: 0 0 30px rgba(0, 204, 255, 0.5); margin-bottom: 10px;
        }
        .search-box {
            width: 80%; max-width: 600px; padding: 18px 25px;
            font-size: 1.2rem; border: none; border-radius: 50px;
            outline: none; background: white; color: #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .currency-container {
            margin-top: 40px; display: flex; gap: 25px;
            background: rgba(255,255,255,0.05); padding: 15px 30px;
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .currency-item { text-align: center; }
        .currency-value { color: #00ccff; font-weight: bold; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Orbicxs</div>
        
        <form id="searchForm" onsubmit="return doSearch(event)">
            <input type="text" id="searchInput" class="search-box" 
                   placeholder="Nima qidiramiz?" autofocus autocomplete="off">
        </form>

        <div class="currency-container">
            <div class="currency-item"><span>USD</span><span class="currency-value" id="usd">...</span></div>
            <div class="currency-item"><span>EUR</span><span class="currency-value" id="eur">...</span></div>
            <div class="currency-item"><span>RUB</span><span class="currency-value" id="rub">...</span></div>
        </div>
    </div>

    <script>
        function doSearch(e) {
            e.preventDefault();
            const val = document.getElementById('searchInput').value.trim();
            if (val) {
                // Brauzerga qidiruv so'rovini yuborish
                window.location.href = "https://orbicxs.com/search?q=" + encodeURIComponent(val);
            }
            return false;
        }

        async function fetchCurrency() {
            try {
                const res = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
                const data = await res.json();
                document.getElementById('usd').innerText = data.find(i => i.Ccy === 'USD').Rate;
                document.getElementById('eur').innerText = data.find(i => i.Ccy === 'EUR').Rate;
                document.getElementById('rub').innerText = data.find(i => i.Ccy === 'RUB').Rate;
            } catch (err) { console.log(err); }
        }
        fetchCurrency();
    </script>
</body>
</html>
