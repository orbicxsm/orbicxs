<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Orbicxs Home</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: white; overflow: hidden;
        }
        .logo {
            font-size: 5rem; font-weight: 900; color: #00ccff;
            text-shadow: 0 0 30px rgba(0, 204, 255, 0.5);
            margin-bottom: 20px; cursor: default;
        }
        .search-box {
            width: 550px; padding: 18px 25px;
            font-size: 1.2rem; border: none; border-radius: 50px;
            outline: none; background: white; color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .search-box:focus { box-shadow: 0 0 20px #00ccff; }
        .currency-container {
            margin-top: 50px; display: flex; gap: 30px;
            background: rgba(255,255,255,0.05); padding: 15px 40px;
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .currency-item { text-align: center; }
        .currency-item span { color: #00ccff; font-weight: bold; display: block; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="logo">Orbicxs</div>
    
    <input type="text" id="searchInput" class="search-box" 
           placeholder="Orbicxs orqali qidirish..." autofocus>

    <div class="currency-container">
        <div class="currency-item">USD <span id="usd">...</span></div>
        <div class="currency-item">EUR <span id="eur">...</span></div>
        <div class="currency-item">RUB <span id="rub">...</span></div>
    </div>

    <script>
        const input = document.getElementById('searchInput');
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = input.value.trim();
                if (query) {
                    // Python brauzeriga qidiruv so'rovini yuborish
                    window.location.href = "https://orbicxs.com/search?q=" + encodeURIComponent(query);
                }
            }
        });

        async function fetchCurrency() {
            try {
                const res = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
                const data = await res.json();
                document.getElementById('usd').innerText = data[0].Rate + " so'm";
                document.getElementById('eur').innerText = data[1].Rate + " so'm";
                document.getElementById('rub').innerText = data[2].Rate + " so'm";
            } catch (err) {}
        }
        fetchCurrency();
    </script>
</body>
</html>
