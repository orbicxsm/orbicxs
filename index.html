<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Finance | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --card: #f8f9fa; --border: #dadce0;
            --text: #202124; --sub: #5f6368; --blue: #1a73e8; --green: #137333; --red: #d93025;
        }
        [data-theme="dark"] {
            --bg: #202124; --card: #303134; --border: #3c4043;
            --text: #e8eaed; --sub: #9aa0a6; --blue: #8ab4f8; --green: #81c995; --red: #f28b82;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Roboto', Arial, sans-serif; margin: 0; padding: 15px;
            transition: 0.2s;
        }

        .container { max-width: 650px; margin: 0 auto; }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
        }
        .logo { font-family: 'Google Sans', sans-serif; font-size: 22px; color: var(--sub); }
        .logo b { color: var(--text); }
        
        .top-right { display: flex; align-items: center; gap: 15px; }
        .author { font-size: 13px; font-weight: 700; color: var(--blue); }
        .mode-btn {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 6px 12px; border-radius: 4px;
            cursor: pointer; font-size: 12px;
        }

        /* Hero Card */
        .hero {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; margin-bottom: 20px;
        }
        .hero-pair { font-size: 14px; color: var(--sub); margin-bottom: 5px; }
        .hero-price { font-size: 32px; font-weight: 400; margin-bottom: 15px; }
        .hero-price span { font-size: 18px; color: var(--sub); }

        .calc-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input {
            width: 100%; padding: 12px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 4px;
            color: var(--text); font-size: 18px; box-sizing: border-box; outline: none;
        }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab {
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
            cursor: pointer; font-size: 13px; font-weight: 500; background: var(--card);
        }
        .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }

        /* Market List */
        .list { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg); }
        .item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .item:hover { background: var(--card); }
        .item-l { display: flex; align-items: center; gap: 12px; }
        .flag { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        
        .price-r { text-align: right; }
        .p-val { font-weight: 700; font-size: 15px; }
        .p-source { font-size: 9px; color: var(--green); font-weight: 700; }

        /* Real Google Style Chart */
        .chart-container { 
            height: 0; overflow: hidden; background: var(--bg); 
            transition: 0.3s; position: relative;
        }
        .chart-container.active { height: 300px; border-top: 1px solid var(--border); }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div class="header">
        <div class="logo">Google <b>Finance</b></div>
        <div class="top-right">
            <span class="author">g'offorov.sh.z</span>
            <button class="mode-btn" onclick="toggleMode()">🌓</button>
        </div>
    </div>

    <div class="hero">
        <div class="hero-pair">USD / UZS (Bozor kursi)</div>
        <div class="hero-price" id="hero-price">12,950.00 <span>UZS</span></div>
        <div class="calc-box">
            <input type="number" id="amtIn" value="1" oninput="doCalc()">
            <input type="text" id="amtOut" readonly>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" id="fiat-t" onclick="switchTab('fiat')">Valyutalar</div>
        <div class="tab" id="crypto-t" onclick="switchTab('crypto')">Binance Kripto</div>
    </div>

    <div class="list" id="main-list"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentMode = 'fiat';
    let usdUzs = 12950;
    let ws;

    const fiats = [
        {id: "USD", name: "Dollar", flag: "us", sym: "FX_IDC:USDUZS"},
        {id: "EUR", name: "Yevro", flag: "eu", sym: "FX_IDC:EURUZS"},
        {id: "RUB", name: "Rubl", flag: "ru", sym: "FX_IDC:RUBUZS"},
        {id: "TRY", name: "Lira", flag: "tr", sym: "FX_IDC:TRYUZS"},
        {id: "GBP", name: "Funt", flag: "gb", sym: "FX_IDC:GBPUZS"}
    ];

    const cryptos = ["BTC", "ETH", "TON", "SOL", "NOT", "DOGE"];

    async function init() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTUZS');
            const d = await r.json();
            usdUzs = parseFloat(d.price);
            document.getElementById('hero-price').innerHTML = `${usdUzs.toLocaleString()} <span>UZS</span>`;
        } catch(e) {}
        render();
        doCalc();
    }

    function render() {
        const list = document.getElementById('main-list');
        list.innerHTML = "";
        if(ws) ws.close();

        if(currentMode === 'fiat') {
            fiats.forEach(f => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="item" onclick="openChart(this, '${f.sym}')">
                        <div class="item-l">
                            <img src="https://flagcdn.com/w80/${f.flag}.png" class="flag">
                            <div><div style="font-weight:700">${f.id}/UZS</div><div style="font-size:10px;color:var(--sub)">Google Finance</div></div>
                        </div>
                        <div class="price-r">
                            <div class="p-val">Market Live</div>
                            <div class="p-source">● SINXRON</div>
                        </div>
                    </div>
                    <div id="c-${f.id}" class="chart-container"></div>
                `;
                list.appendChild(div);
            });
        } else {
            cryptos.forEach(c => {
                const icon = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${c.toLowerCase()}.png`;
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="item" onclick="openChart(this, '${c === 'TON' || c === 'NOT' ? 'OKX:'+c+'USDT' : 'BINANCE:'+c+'USDT'}')">
                        <div class="item-l">
                            <img src="${icon}" class="flag">
                            <div><div style="font-weight:700">${c}/USDT</div><div style="font-size:10px;color:var(--sub)">Binance Live</div></div>
                        </div>
                        <div class="price-r">
                            <div class="p-val" id="price-${c}">---</div>
                            <div class="p-source" id="change-${c}">0.00%</div>
                        </div>
                    </div>
                    <div id="c-${c}" class="chart-container"></div>
                `;
                list.appendChild(div);
            });
            startBinance();
        }
    }

    function openChart(el, sym) {
        const box = el.nextElementSibling;
        const isOpen = box.classList.contains('active');
        document.querySelectorAll('.chart-container').forEach(c => { c.classList.remove('active'); c.innerHTML = ""; });
        
        if(!isOpen) {
            box.classList.add('active');
            const theme = document.body.getAttribute('data-theme') || 'light';
            // Google Finance uslubidagi grafik
            new TradingView.widget({
                "autosize": true, "symbol": sym, "interval": "D", "theme": theme,
                "style": "2", "container_id": box.id, "hide_top_toolbar": true,
                "hide_legend": true, "save_image": false, "backgroundColor": theme === 'dark' ? '#202124' : '#ffffff'
            });
        }
    }

    function startBinance() {
        const pairs = cryptos.filter(x => !['TON','NOT'].includes(x)).map(x => x.toLowerCase() + 'usdt@ticker').join('/');
        ws = new WebSocket(`wss://stream.binance.com:9443/ws/${pairs}`);
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const s = d.s.replace('USDT','');
            const pEl = document.getElementById('price-'+s);
            const cEl = document.getElementById('change-'+s);
            if(pEl) {
                const p = parseFloat(d.c);
                pEl.innerText = p > 1 ? p.toLocaleString() : p.toFixed(4);
                cEl.innerText = d.P + '%';
                cEl.style.color = parseFloat(d.P) >= 0 ? 'var(--green)' : 'var(--red)';
            }
        };
    }

    function doCalc() {
        const val = document.getElementById('amtIn').value;
        document.getElementById('amtOut').value = (val * usdUzs).toLocaleString() + " UZS";
    }

    function switchTab(t) {
        currentMode = t;
        document.getElementById('fiat-t').classList.toggle('active', t==='fiat');
        document.getElementById('crypto-t').classList.toggle('active', t==='crypto');
        render();
    }

    function toggleMode() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        render();
    }

    init();
</script>
</body>
</html>
